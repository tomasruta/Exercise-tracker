<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Exercise Tracker</title>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}
input, textarea, button, select { font-family: inherit; font-size: inherit; }

/* ===== THEME ===== */
:root {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-input: #f0f0f0;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --border: #e0e0e0;
  --accent: #2563eb;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --ss-color: #6366f1;
  --ss-bg: #eef2ff;
  --fence-color: #f59e0b;
  --fence-bg: #fffbeb;
  --new-badge: #8b5cf6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --bg-card: #1c1c1e;
    --bg-input: #2c2c2e;
    --text: #e5e5e5;
    --text2: #aaa;
    --text3: #777;
    --border: #333;
    --green-bg: #052e16;
    --amber-bg: #451a03;
    --red-bg: #450a0a;
    --ss-bg: #1e1b4b;
    --fence-bg: #451a03;
  }
}

/* ===== LAYOUT ===== */
#app { max-width: 500px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom, 20px); }
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 1rem; cursor: pointer; padding: 8px 4px;
  min-width: 44px; min-height: 44px; display: flex; align-items: center;
}
.content { padding: 16px; }

/* ===== HOME ===== */
.workout-grid { display: flex; flex-direction: column; gap: 12px; }
.workout-btn {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  cursor: pointer; text-align: left; width: 100%;
  min-height: 64px; transition: background 0.15s;
}
.workout-btn:active { background: var(--bg-input); }
.workout-id {
  font-size: 1.3rem; font-weight: 700; color: var(--accent);
  min-width: 40px;
}
.workout-info { flex: 1; }
.workout-name { font-size: 0.95rem; font-weight: 600; display: block; }
.workout-sub { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.home-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 10px; font-size: 1rem;
  font-weight: 600; cursor: pointer; text-align: center;
  min-height: 48px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-success { background: var(--green); color: #fff; }
.btn-amber { background: var(--amber); color: #fff; }
.btn:active { opacity: 0.85; }

/* ===== WORKOUT LIST ===== */
.exercise-list { display: flex; flex-direction: column; gap: 2px; }
.ss-group {
  border-left: 3px solid var(--ss-color);
  background: var(--ss-bg);
  border-radius: 0 10px 10px 0;
  margin: 4px 0;
}
.ss-label {
  font-size: 0.7rem; font-weight: 700; color: var(--ss-color);
  padding: 4px 10px 0; text-transform: uppercase; letter-spacing: 0.5px;
}
.ex-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  min-height: 52px;
}
.ss-group .ex-row { background: transparent; border-bottom: 1px solid var(--border); }
.ss-group .ex-row:last-child { border-bottom: none; }
.ex-num { font-size: 0.8rem; color: var(--text3); min-width: 22px; text-align: right; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 0.95rem; font-weight: 500; }
.ex-meta { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.ex-status { font-size: 1.1rem; min-width: 28px; text-align: center; }
.badge {
  display: inline-block; font-size: 0.65rem; font-weight: 700;
  padding: 1px 5px; border-radius: 4px; vertical-align: middle; margin-left: 4px;
}
.badge-new { background: var(--new-badge); color: #fff; }
.badge-ss { background: var(--ss-color); color: #fff; }

/* ===== MALTO FENCE ===== */
.malto-fence {
  display: flex; align-items: center; gap: 10px;
  background: var(--fence-bg); border: 2px solid var(--fence-color);
  border-radius: 10px; padding: 10px 14px; margin: 10px 0;
  font-weight: 700; font-size: 0.85rem; color: var(--fence-color);
}

/* ===== EXERCISE DETAIL ===== */
.ex-detail { padding-bottom: 100px; }
.ex-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.ex-target { font-size: 1rem; color: var(--text2); margin-bottom: 12px; }
.cue-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.cue-toggle {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; font-weight: 600; font-size: 0.9rem;
  background: none; border: none; width: 100%; text-align: left;
  color: var(--text); padding: 0;
}
.cue-toggle::after { content: '▼'; font-size: 0.7rem; color: var(--text3); transition: transform 0.2s; }
.cue-section.collapsed .cue-toggle::after { transform: rotate(-90deg); }
.cue-body { margin-top: 8px; font-size: 0.85rem; color: var(--text2); line-height: 1.5; }
.cue-section.collapsed .cue-body { display: none; }
.cue-label { font-weight: 700; font-size: 0.8rem; color: var(--text); margin: 8px 0 2px; text-transform: uppercase; letter-spacing: 0.03em; }
.cue-label:first-child { margin-top: 0; }
.cue-list { margin: 0; padding-left: 1.2em; }
.cue-list li { margin-bottom: 2px; }
.cue-list.mistakes { list-style: none; padding-left: 0; }
.cue-list.mistakes li::before { content: '❌ '; }
.cue-list.you { list-style: none; padding-left: 0; color: var(--text3); font-style: italic; }
.cue-list.you li::before { content: '→ '; }
.chop-direction { display: inline-block; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.chop-direction:active { opacity: 0.7; }
.last-session {
  background: var(--bg-input); border-radius: 10px;
  padding: 12px; margin-bottom: 16px; font-size: 0.85rem;
}
.last-session-title { font-weight: 600; margin-bottom: 4px; color: var(--text2); }

/* ===== SET INPUTS ===== */
.sets-header {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr;
  gap: 8px; padding: 0 4px 6px; font-size: 0.75rem;
  color: var(--text3); font-weight: 600; text-transform: uppercase;
}
.set-row {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr;
  gap: 8px; align-items: center; margin-bottom: 8px;
}
.set-label {
  font-size: 0.85rem; font-weight: 600; color: var(--text2);
  text-align: center; padding: 10px 0;
}
.set-input {
  width: 100%; padding: 12px 10px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 8px; font-size: 1.15rem; font-weight: 600;
  color: var(--text); text-align: center;
  min-height: 48px;
}
.set-input:focus { border-color: var(--accent); outline: none; }
.set-x { text-align: center; color: var(--text3); font-weight: 600; }
.bump-note {
  font-size: 0.8rem; color: var(--green); margin-top: -4px; margin-bottom: 8px;
  padding-left: 54px;
}

.notes-field {
  width: 100%; padding: 12px; margin-top: 12px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 10px; font-size: 0.95rem; color: var(--text);
  resize: vertical; min-height: 60px; line-height: 1.4;
}
.notes-field:focus { border-color: var(--accent); outline: none; }
.notes-field::placeholder { color: var(--text3); }

/* ===== PROGRESSION BANNER ===== */
.progression-banner {
  padding: 10px 14px; border-radius: 10px; font-size: 0.9rem;
  font-weight: 600; margin-top: 12px;
}
.banner-green { background: var(--green-bg); color: var(--green); }
.banner-amber { background: var(--amber-bg); color: var(--amber); }
.banner-atg { background: var(--bg-input); color: var(--text2); }

/* ===== FIXED SAVE BAR ===== */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  background: var(--bg); border-top: 1px solid var(--border);
  z-index: 100; display: flex; gap: 10px;
  max-width: 500px; margin: 0 auto;
}
.save-bar .btn { flex: 1; }

/* ===== SUMMARY ===== */
.summary-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 8px;
}
.summary-name { font-weight: 600; font-size: 0.95rem; }
.summary-sets { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }
.summary-notes { font-size: 0.85rem; color: var(--text3); margin-top: 4px; font-style: italic; }
.summary-section { margin-bottom: 20px; }
.summary-section h3 { font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ===== IMPORT MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--bg); border-radius: 16px 16px 0 0;
  padding: 20px; width: 100%; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
}
.modal h2 { font-size: 1.1rem; margin-bottom: 12px; }
.modal textarea {
  width: 100%; min-height: 200px; padding: 12px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 10px; font-size: 0.85rem; color: var(--text);
  font-family: monospace; resize: vertical;
}
.modal-actions { display: flex; gap: 10px; margin-top: 12px; }
.modal-actions .btn { flex: 1; }
.import-result { margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 0.85rem; }

/* ===== VARIANT PILLS ===== */
.variant-pills { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.variant-pill {
  padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
  border: 2px solid var(--border); background: var(--bg-card); color: var(--text2);
  cursor: pointer; min-height: 36px;
}
.variant-pill.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ===== TIMER ===== */
.timer-block { margin-bottom: 16px; }
.timer-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
}
.timer-side { font-weight: 600; font-size: 0.85rem; color: var(--text2); min-width: 44px; }
.timer-display { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; flex: 1; text-align: center; }
.timer-btn {
  padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
  border: none; cursor: pointer; min-height: 40px; min-width: 72px;
}
.timer-btn-start { background: var(--green); color: #fff; }
.timer-btn-pause { background: var(--amber); color: #fff; }
.timer-btn-done { background: var(--green-bg); color: var(--green); }

/* ===== COMPLETION TOGGLES ===== */
.completion-row {
  display: flex; align-items: center; gap: 16px; justify-content: center;
  padding: 16px; margin-bottom: 12px;
}
.completion-toggle {
  display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
}
.completion-toggle .check-box {
  width: 56px; height: 56px; border-radius: 12px; font-size: 1.5rem;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--border); background: var(--bg-card); transition: all 0.15s;
}
.completion-toggle.done .check-box { border-color: var(--green); background: var(--green-bg); }
.completion-toggle .check-label { font-size: 0.8rem; font-weight: 600; color: var(--text2); }

/* ===== UNILATERAL SETS ===== */
.uni-set-group { margin-bottom: 12px; }
.uni-set-label { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; padding-left: 4px; }
.uni-side-row {
  display: grid; grid-template-columns: 28px 1fr 24px 1fr; gap: 6px;
  align-items: center; margin-bottom: 4px;
}
.uni-side-label { font-size: 0.75rem; font-weight: 700; color: var(--text3); text-align: center; }

/* Split reps: shared weight + L/R reps */
.split-reps-weight { margin-bottom: 12px; }
.split-reps-weight label { font-size: 0.8rem; font-weight: 600; color: var(--text2); display: block; margin-bottom: 4px; }
.split-reps-row {
  display: grid; grid-template-columns: 50px 28px 1fr 28px 1fr; gap: 6px;
  align-items: center; margin-bottom: 8px;
}

/* ===== SLED TRACKING ===== */
.sled-persistent {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.sled-persistent label { font-size: 0.85rem; font-weight: 600; color: var(--text2); }
.sled-persistent input { width: 80px; margin: 0 8px; }
.sled-set-row {
  display: grid; grid-template-columns: 50px 1fr 1fr 1fr 48px; gap: 6px;
  align-items: center; margin-bottom: 8px;
}
.sled-derived { font-size: 0.8rem; color: var(--text3); padding-left: 54px; margin-top: -4px; margin-bottom: 8px; }
.stopwatch-btn {
  padding: 0; border-radius: 8px; font-size: 1.5rem; font-weight: 700;
  border: 1px solid var(--border); background: var(--bg-card); cursor: pointer;
  height: 44px; width: 48px;
  display: inline-flex; align-items: center; justify-content: center;
}
.stopwatch-btn.running { background: var(--red); color: #fff; border-color: var(--red); }

/* ===== WEIGHT/DISTANCE ===== */
.wd-set-row {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr; gap: 8px;
  align-items: center; margin-bottom: 8px;
}

/* ===== WORKOUT NOTES ===== */
.workout-notes { margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--border); }
.workout-notes label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--text2); }
.workout-notes .notes-field { margin-top: 0; margin-bottom: 12px; }
</style>
</head>

<div id="app"></div>
<script>
// =====================================================
// PROGRAMME DATA — ATG 6-Workout Rotation (5 Apr 2026)
// Exercise IDs are the stable contract across workouts.
// Do NOT add workout suffixes to IDs.
//
// NEW FIELDS (Amendment #1):
//   trackingType: 'weight_reps'|'reps_only'|'duration'|'completion'|'sled'|'weight_distance'
//   unilateral: 'split_weight'|'split_reps'|false  (L/R tracking mode)
//   prefillReps: number|null  (auto-populate reps input)
//   variants: [{id,label,trackingType,isDefault}]|null
//   timerSeconds: number|null  (countdown duration)
//   repsLabel: 'reps'|'meters'|'steps'|'lengths'  (default: 'reps')

  ],

    { id: 'ham-curl-prone', label: 'Ham curl (prone)', trackingType: 'weight_reps', isDefault: false }
  ]
};

// Structured form cues for the 10 new exercises (Session 5)
// For variant exercises, keys are variant IDs
const FORM_CUES = {

    you: ['Start 20-25kg/hand']
  },
  'band-pull-apart': {

    exec: ['Pull apart by squeezing scapulae', 'Elbows out+back', '1s squeeze at retraction'],
    mistakes: ['Shrug', 'Pull with arms', 'Band too heavy', 'Stop short of full retraction'],

// ID alias map for backward compatibility with old session data
const ID_ALIASES = {
  'reverse-sled': 'sled',
  'push-pull-sled': 'sled'
};

const PROGRAMME = [
  {
    id: 1,
    name: "Back Health + Posterior Chain",
    subtitle: "~115 min",

// =====================================================
// DATA MODULE — localStorage read/write
// =====================================================
const Data = (function() {
  const SESSIONS_KEY = 'gym-sessions';
  const WIP_KEY = 'gym-session-wip';
  const SLED_LENGTH_KEY = 'gym-sled-length-distance';
  const VARIANT_PREFIX = 'gym-variant-';

  function getSessions() {
    try {
      return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || [];
    } catch { return []; }
  }

  function saveSessions(sessions) {
    try {
      localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
    } catch (e) {
      alert('Storage full! Export your data and clear old sessions.');
    }
  }

  function addSession(session) {
    const sessions = getSessions();
    sessions.push(session);
    saveSessions(sessions);
  }

  function getWIP() {
    try {
      return JSON.parse(localStorage.getItem(WIP_KEY));
    } catch { return null; }
  }

  function saveWIP(wip) {
    try {
      localStorage.setItem(WIP_KEY, JSON.stringify(wip));
    } catch (e) {
      console.error('Failed to save WIP:', e);
    }
  }

  function clearWIP() {
    localStorage.removeItem(WIP_KEY);
  }

  function markExported(sessionIndex) {
    const sessions = getSessions();
    if (sessions[sessionIndex]) {
      sessions[sessionIndex].exported = true;
      saveSessions(sessions);
    }
  }

  function getUnexportedSessions() {
    return getSessions().filter(s => !s.exported);
  }

  // Sled length distance (meters per length, persists across sessions)
  function getSledLength() {
    return parseFloat(localStorage.getItem(SLED_LENGTH_KEY)) || 15;
  }

  function setSledLength(meters) {
    localStorage.setItem(SLED_LENGTH_KEY, String(meters));
  }

  // Variant selection per exercise (persists across sessions)
  function getVariant(exerciseId) {
    return localStorage.getItem(VARIANT_PREFIX + exerciseId) || null;
  }

  function setVariant(exerciseId, variantId) {

// =====================================================
// STATE MODULE — working session + history lookups
// =====================================================
const State = (function() {
  let wip = null;

  function init() {
    wip = Data.getWIP();
  }

  function startSession(workoutId) {
    wip = {
      workoutId,
      date: new Date().toISOString().slice(0, 10),
      startedAt: new Date().toISOString(),
      exercises: {},
      overall: '',
      injuries: '',
    };
    Data.saveWIP(wip);
    return wip;
  }

  function getWIP() { return wip; }

  function hasWIP() { return wip !== null; }

  function logExercise(exIndex, data) {
    if (!wip) return;
    wip.exercises[exIndex] = data;
    Data.saveWIP(wip);
  }

  function updateSessionNotes(overall, injuries) {
    if (!wip) return;
    wip.overall = overall;
    wip.injuries = injuries;
    Data.saveWIP(wip);
  }

  function getExerciseData(exIndex) {
    if (!wip || !wip.exercises[exIndex]) return null;
    return wip.exercises[exIndex];
  }

  function isExerciseLogged(exIndex) {
    if (!wip || !wip.exercises[exIndex]) return false;
    const data = wip.exercises[exIndex];
    // Completion type: check if done/doneL/doneR is set
    if (data.done || data.doneL || data.doneR) return true;
    // Sled: check if any set has lengths
    if (data.sets && data.sets.some(s => s.lengths)) return true;
    // Weight/distance: check if any set has distance
    if (data.sets && data.sets.some(s => s.distance)) return true;
    // Standard/unilateral: check reps
    if (data.sets && data.sets.some(s => {
      if (s.reps !== null && s.reps !== undefined && s.reps !== '') return true;
      if (s.repsL !== null && s.repsL !== undefined && s.repsL !== '') return true;
      return false;
    })) return true;
    return false;
  }

  function finishSession() {
    if (!wip) return null;
    wip.completedAt = new Date().toISOString();
    Data.addSession(wip);
    const finished = { ...wip };
    wip = null;
    Data.clearWIP();
    return finished;
  }

  function abandonSession() {
    wip = null;
    Data.clearWIP();
  }

  // Resolve an exercise ID through the alias map
  function resolveId(id) {
    return ID_ALIASES[id] || id;
  }

  // Find last entry for a given exercise ID across all sessions
  // Checks both current ID and any aliases (for backward compat with old sled IDs etc.)
  function getLastEntry(exerciseId) {
    const targetId = resolveId(exerciseId);
    const sessions = Data.getSessions();
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      const workout = PROGRAMME.find(w => w.id === s.workoutId);
      if (!workout) continue;
      for (const [idx, data] of Object.entries(s.exercises)) {
        const ex = workout.exercises[parseInt(idx)];
        if (!ex) continue;
        const exResolved = resolveId(ex.id);
        if (exResolved === targetId && (
          (data.sets && data.sets.length > 0) ||
          data.done || data.doneL || data.doneR
        )) {
          return { date: s.date, workoutId: s.workoutId, ...data };
        }
      }
    }
    return null;
  }

  return { init, startSession, getWIP, hasWIP, logExercise, updateSessionNotes, getExerciseData, isExerciseLogged, finishSession, abandonSession, getLastEntry };
})();

// =====================================================
// PROGRESSION MODULE — auto-bump + banners
// =====================================================
const Progression = (function() {

  function getWeightStep(progressionType) {
    if (progressionType === 'compound') return 2.5;
    if (progressionType === 'isolation') return 1;
    return 0;
  }

  function shouldAutoBump(lastSets, repRange, unilateral) {
    if (!repRange || !lastSets || lastSets.length === 0) return false;
    const top = repRange[1];
    if (unilateral === 'split_reps') {
      // Both sides must hit top on ALL sets
      return lastSets.every(s => {
        const l = parseInt(s.repsL); const r = parseInt(s.repsR);
        return !isNaN(l) && l >= top && !isNaN(r) && r >= top;
      });
    }
    return lastSets.every(s => {
      const r = parseInt(s.reps);
      return !isNaN(r) && r >= top;
    });
  }

  function getPreFill(exerciseId, exercise) {
    const last = State.getLastEntry(exerciseId);
    const result = { weight: '', weightL: '', weightR: '', bumped: false, from: null };
    if (!last || !last.sets || last.sets.length === 0) return result;

    if (exercise.unilateral === 'split_weight') {
      result.weightL = last.sets[0].weightL || '';
      result.weightR = last.sets[0].weightR || '';
      return result;
    }

    if (exercise.unilateral === 'split_reps') {
      const lastWeight = last.weight || last.sets[0]?.weight || 0;
      if (exercise.repRange && shouldAutoBump(last.sets, exercise.repRange, 'split_reps')) {
        const step = getWeightStep(exercise.progressionType);
        if (step > 0) {
          return { ...result, weight: lastWeight + step, bumped: true, from: lastWeight };
        }
      }
      return { ...result, weight: lastWeight || '' };
    }

    const lastWeight = last.sets[0].weight || 0;
    if (exercise.repRange && shouldAutoBump(last.sets, exercise.repRange)) {
      const step = getWeightStep(exercise.progressionType);
      if (step > 0) {
        return { ...result, weight: lastWeight + step, bumped: true, from: lastWeight };
      }
    }
    return { ...result, weight: lastWeight || '' };
  }

  function getBanner(sets, exercise) {
    if (!exercise.progressionType) return null;
    if (exercise.progressionType === 'atg') {
      return { type: 'atg', text: 'Add load when form is solid' };
    }
    if (!exercise.repRange) return null;

    const [low, high] = exercise.repRange;

    // Unilateral split_reps: check both sides
    if (exercise.unilateral === 'split_reps') {
      const validSets = sets.filter(s => s.repsL !== undefined && s.repsL !== '' && s.repsR !== undefined && s.repsR !== '');
      if (validSets.length === 0) return null;
      const lAllTop = validSets.every(s => parseInt(s.repsL) >= high);
      const rAllTop = validSets.every(s => parseInt(s.repsR) >= high);
      const lAnyBelow = validSets.some(s => parseInt(s.repsL) < low);
      const rAnyBelow = validSets.some(s => parseInt(s.repsR) < low);

      if (lAllTop && rAllTop) {
        const step = getWeightStep(exercise.progressionType);
        const label = step > 0 ? `+${step}kg` : '';
        return { type: 'green', text: `Both sides at ${high} — add ${label} next session` };
      }
      if (lAnyBelow || rAnyBelow) {
        const lStatus = lAllTop ? 'All at ' + high : 'Below';
        const rStatus = rAllTop ? 'All at ' + high : 'Below';
        return { type: 'amber', text: `L: ${lStatus} · R: ${rStatus} — stay at this weight` };
      }
      return null;
    }

    const validSets = sets.filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '');
    if (validSets.length === 0) return null;

    const allAtTop = validSets.every(s => parseInt(s.reps) >= high);
    const anyBelowBottom = validSets.some(s => parseInt(s.reps) < low);

    if (allAtTop) {
      const step = getWeightStep(exercise.progressionType);
      const label = step > 0 ? `+${step}kg` : '';
      return { type: 'green', text: `All sets at ${high} — add ${label} next session` };
    }
    if (anyBelowBottom) {
      return { type: 'amber', text: `Below range — stay at this weight` };
    }
    return null;
  }

  return { getPreFill, getBanner, shouldAutoBump };
})();

// =====================================================
// MARKDOWN MODULE — export + import
// =====================================================
const Markdown = (function() {

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function exportSession(session) {
    const workout = PROGRAMME.find(w => w.id === session.workoutId);
    if (!workout) return '';

    let md = `## ${formatDate(session.date)} — Workout ${workout.id} (${workout.name})\n\n`;

    if (session.overall) md += `**Overall:** ${session.overall}\n`;
    if (session.injuries) md += `**Injuries:** ${session.injuries}\n`;
    if (session.overall || session.injuries) md += '\n';

    for (const [idx, data] of Object.entries(session.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;

      const variantStr = data.variant ? ` [${data.variant}]` : '';

      // Duration/completion exercises
      if (data.done !== undefined || data.doneL !== undefined) {
        if (data.doneL !== undefined) {
          md += `- **${ex.name}**${variantStr} — L${data.doneL ? '✅' : '—'} R${data.doneR ? '✅' : '—'}\n`;
        } else {
          md += `- **${ex.name}**${variantStr} — ${data.done ? '✅' : '—'}\n`;
        }
        if (data.notes) md += `  - ${data.notes}\n`;
        continue;
      }

      if (!data.sets || data.sets.length === 0) continue;
      const s0 = data.sets[0];

      // Sled
      if (s0.lengths !== undefined) {
        const sledLength = Data.getSledLength();
        for (const s of data.sets) {
          const dist = s.lengths * sledLength;
          md += `- **${ex.name}**${variantStr} — 1×[${s.lengths} lengths, ${Timer.formatTime(s.timeSeconds||0)}] @ ${s.weight||0}kg (length = ${sledLength}m, total ~${Math.round(dist)}m)\n`;
        }
        if (data.notes) md += `  - ${data.notes}\n`;
        continue;
      }

      // Weight/distance (farmer's carry)
      if (s0.distance !== undefined) {
        const setsStr = data.sets.filter(s => s.distance).map(s => s.distance + 'm').join(',');
        const weight = s0.weight || 0;
        md += `- **${ex.name}**${variantStr} — ${data.sets.length}×[${setsStr}] @ ${weight}${ex.weightLabel || 'kg'}\n`;
        if (data.notes) md += `  - ${data.notes}\n`;
        continue;
      }

      // Unilateral split_weight
      if (s0.weightL !== undefined) {
        const setsStr = data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L${s.repsL}/R${s.repsR}`).join(',');
        md += `- **${ex.name}**${variantStr} — ${ex.sets}×[${setsStr}] @ L:${s0.weightL}kg R:${s0.weightR}kg\n`;
        if (data.notes) md += `  - ${data.notes}\n`;
        continue;
      }

      // Unilateral split_reps
      if (s0.repsL !== undefined) {
        const setsStr = data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L${s.repsL}/R${s.repsR}`).join(',');
        const weight = data.weight || s0.weight || 0;
        md += `- **${ex.name}**${variantStr} — ${ex.sets}×[${setsStr}] @ ${weight}kg\n`;
        if (data.notes) md += `  - ${data.notes}\n`;
        continue;
      }

      // Standard weight×reps or reps_only
      const setsStr = data.sets
        .filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '')
        .map(s => s.reps)
        .join(',');

      const weight = s0.weight;
      const weightStr = weight ? ` @ ${weight}kg` : ' @ BW';

      md += `- **${ex.name}**${variantStr} — ${ex.sets}×[${setsStr}]${weightStr}\n`;
      if (data.notes) md += `  - ${data.notes}\n`;
    }

    md += '\n';
    return md;
  }

  function exportAll() {
    const sessions = Data.getSessions();
    if (sessions.length === 0) return '# Training Log\n\nNo sessions recorded yet.\n';
    let md = '# Training Log\n\n';
    // Sort by date ascending
    const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
    for (const s of sorted) {
      md += exportSession(s);
      md += '---\n\n';
    }
    return md;
  }

  // Build lookup map for fuzzy matching (includes old names via aliases)
  function buildLookup() {
    const map = {};
    for (const w of PROGRAMME) {
      for (let i = 0; i < w.exercises.length; i++) {
        const ex = w.exercises[i];
        if (ex.isFence) continue;
        const norm = ex.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (!map[norm]) map[norm] = { id: ex.id, name: ex.name };
      }
    }
    // Add old names that map to new IDs
    const oldNames = {
      'reversesleddedmilling': 'sled',
      'reversesled': 'sled',
      'pushpullsled': 'sled',
      'atgsplitsquat': 'atg-split-squat',
      'atglunge': 'atg-lunge',
      'atglungewalking': 'atg-lunge',
      'singlelegcalfraise': 'sl-calf-raise',
      'slcalfraise': 'sl-calf-raise',
      'slcalfraisestanding': 'sl-calf-raise',
    };
    for (const [norm, id] of Object.entries(oldNames)) {
      if (!map[norm]) {
        const ex = PROGRAMME.flatMap(w => w.exercises).find(e => e.id === id);
        if (ex) map[norm] = { id: ex.id, name: ex.name };
      }
    }
    return map;
  }

  const LOOKUP = buildLookup();

  function matchExercise(name) {
    const norm = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    // Exact match
    if (LOOKUP[norm]) return LOOKUP[norm];
    // Partial match
    for (const [key, val] of Object.entries(LOOKUP)) {
      if (key.includes(norm) || norm.includes(key)) return val;
    }
    return null;
  }

  function importMarkdown(text) {
    const sessions = [];
    const blocks = text.split(/^## /m).filter(b => b.trim());
    let matched = 0, unmatched = 0, unmatchedNames = [];

    for (const block of blocks) {
      const lines = block.split('\n');
      // Parse date and workout number
      const headerMatch = lines[0].match(/(\d{1,2}\s+\w+\s+\d{4}).*?Workout\s*(\d)/i);
      if (!headerMatch) continue;

      const dateStr = headerMatch[1];
      const workoutId = parseInt(headerMatch[2]);
      // Parse to YYYY-MM-DD (use local date to avoid timezone shifts)
      const d = new Date(dateStr + ' 12:00:00');
      const date = isNaN(d.getTime()) ? dateStr : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

      const workout = PROGRAMME.find(w => w.id === workoutId);
      if (!workout) continue;

      const session = { workoutId, date, startedAt: '', exercises: {}, overall: '', injuries: '' };

      // Parse overall/injuries
      for (const line of lines) {
        const overallMatch = line.match(/\*\*Overall:\*\*\s*(.+)/);
        if (overallMatch) session.overall = overallMatch[1];
        const injuryMatch = line.match(/\*\*Injur\w*:\*\*\s*(.+)/);
        if (injuryMatch) session.injuries = injuryMatch[1];
      }

      // Parse exercises
      let currentExNotes = null;
      for (const line of lines) {
        const noteMatch = line.match(/^\s+-\s+(.+)/);

        // Try each format in order of specificity
        let parsed = null;
        let exName = null;
        let variantId = null;

        // Extract exercise name (with optional variant)
        const nameMatch = line.match(/^-\s+\*\*(.+?)\*\*\s*(?:\[(\w[\w-]*)\])?\s*—\s*(.*)/);
        if (nameMatch) {
          exName = nameMatch[1];
          variantId = nameMatch[2] || null;
          const rest = nameMatch[3].trim();

          // 1. Completion unilateral: L✅ R— or L— R✅
          const compUni = rest.match(/^L([✅—])\s*R([✅—])$/);
          if (compUni) {
            parsed = { doneL: compUni[1] === '✅', doneR: compUni[2] === '✅' };
          }

          // 2. Completion bilateral: just ✅ or —
          if (!parsed && /^[✅—]$/.test(rest)) {
            parsed = { done: rest === '✅' };
          }

          // 3. Sled: 1×[8 lengths, 2:30] @ 30kg (length = 15m, total ~120m)
          if (!parsed) {
            const sledMatch = rest.match(/^\d+×\[(\d+)\s*lengths?,\s*(\d+:\d{2})\]\s*@\s*([\d.]+)kg\s*\(length\s*=\s*([\d.]+)m/);
            if (sledMatch) {
              const timeParts = sledMatch[2].split(':');
              const timeSeconds = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
              parsed = { sets: [{ weight: parseFloat(sledMatch[3]), lengths: parseInt(sledMatch[1]), timeSeconds }] };
            }
          }

          // 4. Weight/distance: 3×[40m,35m,30m] @ 22kg/hand
          if (!parsed) {
            const wdMatch = rest.match(/^(\d+)×\[([^\]]+)\]\s*@\s*([\d.]+)kg/);
            if (wdMatch && wdMatch[2].includes('m') && !wdMatch[2].includes('/')) {
              const distances = wdMatch[2].split(',').map(d => parseInt(d.trim()));
              parsed = { sets: distances.map(d => ({ weight: parseFloat(wdMatch[3]), distance: d })) };
            }
          }

          // 5. Split_weight: 3×[L10/R10,L8/R9] @ L:5kg R:5kg
          if (!parsed) {
            const swMatch = rest.match(/^(\d+)×\[([^\]]+)\]\s*@\s*L:([\d.]+)kg\s*R:([\d.]+)kg/);
            if (swMatch) {
              const pairs = swMatch[2].split(',').map(p => {
                const lr = p.trim().match(/L(\d+)\/R(\d+)/);
                return lr ? { weightL: parseFloat(swMatch[3]), repsL: parseInt(lr[1]), weightR: parseFloat(swMatch[4]), repsR: parseInt(lr[2]) } : null;
              }).filter(Boolean);
              parsed = { sets: pairs };
            }
          }

          // 6. Split_reps: 5×[L6/R8,L7/R7] @ 20kg
          if (!parsed) {
            const srMatch = rest.match(/^(\d+)×\[([^\]]+)\]\s*@\s*([\d.]+)kg/);
            if (srMatch && srMatch[2].includes('L') && srMatch[2].includes('/R')) {
              const pairs = srMatch[2].split(',').map(p => {
                const lr = p.trim().match(/L(\d+)\/R(\d+)/);
                return lr ? { repsL: parseInt(lr[1]), repsR: parseInt(lr[2]) } : null;
              }).filter(Boolean);
              parsed = { weight: parseFloat(srMatch[3]), sets: pairs };
            }
          }

          // 7. Standard weight×reps: 5×[6,8,6] @ 50kg or @ BW
          if (!parsed) {
            const stdMatch = rest.match(/^(\d+)×\[([^\]]+)\]\s*@\s*([\d.]+)kg/);
            const bwMatch = rest.match(/^(\d+)×\[([^\]]+)\]\s*@\s*BW/);
            const m = stdMatch || bwMatch;
            if (m) {
              const repsArr = m[2].split(',').map(r => r.trim());
              const weight = stdMatch ? parseFloat(m[3]) : 0;
              parsed = { sets: repsArr.map(r => ({ weight, reps: parseInt(r) || r })) };
            }
          }
        }

        if (parsed && exName) {
          const matched_ = matchExercise(exName);
          if (matched_) {
            const exIdx = workout.exercises.findIndex(e => e.id === matched_.id);
            if (exIdx >= 0) {
              parsed.notes = '';
              if (variantId) parsed.variant = variantId;
              session.exercises[exIdx] = parsed;
              currentExNotes = exIdx;
              matched++;
            } else {
              unmatched++;
              unmatchedNames.push(exName);
              currentExNotes = null;
            }
          } else {
            unmatched++;
            unmatchedNames.push(exName);
            currentExNotes = null;
          }
        } else if (noteMatch && currentExNotes !== null) {
          if (session.exercises[currentExNotes]) {
            session.exercises[currentExNotes].notes = noteMatch[1];
          }
        }
      }

      if (Object.keys(session.exercises).length > 0) {
        sessions.push(session);
      }
    }

    return { sessions, matched, unmatched, unmatchedNames };
  }

  return { exportSession, exportAll, importMarkdown, formatDate };
})();

// =====================================================
// TIMER MODULE — countdown + stopwatch
// =====================================================
const Timer = (function() {
  let audioCtx = null;
  const timers = {}; // keyed by element ID

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function beep() {
    try {
      ensureAudio();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      setTimeout(() => osc.stop(), 200);
    } catch (e) { /* audio not available */ }
  }

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate(200);
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // Countdown timer for duration/completion exercises
  function startCountdown(id, totalSeconds, onComplete) {
    ensureAudio();
    if (timers[id]) clearInterval(timers[id].interval);

    const el = document.getElementById(id);
    const btn = document.getElementById(id + '-btn');
    if (!el) return;

    let remaining = totalSeconds;
    el.textContent = formatTime(remaining);
    if (btn) { btn.textContent = 'PAUSE'; btn.className = 'timer-btn timer-btn-pause'; }

    timers[id] = {
      remaining,
      paused: false,
      interval: setInterval(() => {
        if (timers[id].paused) return;
        timers[id].remaining--;
        el.textContent = formatTime(timers[id].remaining);
        if (timers[id].remaining <= 0) {
          clearInterval(timers[id].interval);
          delete timers[id];
          el.textContent = '0:00';
          if (btn) { btn.textContent = 'DONE'; btn.className = 'timer-btn timer-btn-done'; }
          beep();
          vibrate();
          if (onComplete) onComplete();
        }
      }, 1000)
    };
  }

  function togglePause(id) {
    if (!timers[id]) return false;
    timers[id].paused = !timers[id].paused;
    const btn = document.getElementById(id + '-btn');
    if (btn) {
      btn.textContent = timers[id].paused ? 'RESUME' : 'PAUSE';
      btn.className = timers[id].paused ? 'timer-btn timer-btn-start' : 'timer-btn timer-btn-pause';
    }
    return true;
  }

  function isRunning(id) { return !!timers[id] && !timers[id].paused; }
  function isActive(id) { return !!timers[id]; }

  // Stopwatch for sled time tracking
  const stopwatches = {};

  function toggleStopwatch(id, timeInputId) {
    ensureAudio();
    const btn = document.getElementById(id);
    if (!btn) return;

    if (stopwatches[id]) {
      // Stop
      const elapsed = Math.round((Date.now() - stopwatches[id].start) / 1000);
      clearInterval(stopwatches[id].interval);
      delete stopwatches[id];
      btn.textContent = '⏱️';
      btn.classList.remove('running');
      // Fill the time input
      const timeInput = document.getElementById(timeInputId);
      if (timeInput) timeInput.value = formatTime(elapsed);
      // Trigger autosave
      timeInput?.dispatchEvent(new Event('input', { bubbles: true }));
    } else {
      // Start
      const start = Date.now();
      btn.textContent = 'STOP';
      btn.classList.add('running');
      stopwatches[id] = {
        start,
        interval: setInterval(() => {
          const elapsed = Math.round((Date.now() - start) / 1000);
          btn.textContent = formatTime(elapsed);
        }, 1000)
      };
    }
  }

  function cleanup() {
    Object.values(timers).forEach(t => clearInterval(t.interval));
    Object.values(stopwatches).forEach(s => clearInterval(s.interval));
    Object.keys(timers).forEach(k => delete timers[k]);
    Object.keys(stopwatches).forEach(k => delete stopwatches[k]);
  }

  return { startCountdown, togglePause, isRunning, isActive, toggleStopwatch, formatTime, cleanup, ensureAudio };
})();

        <div class="workout-grid">

            <button class="workout-btn" onclick="Router.go('/w/${w.id}')">

              <div class="workout-info">
                <span class="workout-name">${w.name}</span>

        </div>
      </div>`;

  function renderWorkout(workoutId) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) { renderHome(); return; }

    // Start or resume session
    const wip = State.getWIP();
    if (!wip || wip.workoutId !== workoutId) {
      if (wip) {
        if (!confirm(`You have an unfinished W${wip.workoutId} session. Discard it and start W${workoutId}?`)) {
          Router.go('/');
          return;
        }
        State.abandonSession();
      }
      State.startSession(workoutId);
    }

    // Build exercise rows grouped by supersets
    let rows = '';
    let exNum = 0;
    let i = 0;

    while (i < workout.exercises.length) {
      const ex = workout.exercises[i];

      if (ex.isFence) {
        rows += `<div class="malto-fence">🥤 MALTO FENCE — ${ex.fenceNote}</div>`;
        i++;
        continue;
      }

      exNum++;

      // Check if this is a superset
      if (ex.flow === 'SS' && ex.supersetWith) {
        // Find partner
        const partnerIdx = workout.exercises.findIndex((e, j) => j > i && e.id === ex.supersetWith);
        if (partnerIdx >= 0) {
          const partner = workout.exercises[partnerIdx];
          const exNum2 = exNum + 1;
          rows += `
            <div class="ss-group">
              <div class="ss-label">Superset</div>
              ${renderExRow(ex, i, exNum, workoutId)}
              ${renderExRow(partner, partnerIdx, exNum2, workoutId)}
            </div>`;
          exNum++;
          i = partnerIdx + 1;
          continue;
        }
      }

      rows += renderExRow(ex, i, exNum, workoutId);
      i++;
    }

    const wipData = State.getWIP();

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Router.go('/')">← Home</button>
        <h1>W${workoutId} — ${workout.name}</h1>
      </div>
      <div class="content">
        <div class="exercise-list">${rows}</div>
        <div class="workout-notes">
          <label>How did it feel overall?</label>
          <textarea class="notes-field" id="overall-notes" placeholder="Speak or type..."
            oninput="State.updateSessionNotes(this.value, document.getElementById('injury-notes').value)"
          >${wipData?.overall || ''}</textarea>
          <label>Injuries / concerns</label>
          <textarea class="notes-field" id="injury-notes" placeholder="Any pain, tweaks, flags..."
            oninput="State.updateSessionNotes(document.getElementById('overall-notes').value, this.value)"
          >${wipData?.injuries || ''}</textarea>
        </div>
        <div style="margin-top:16px;padding-bottom:20px;">
          <button class="btn btn-success" onclick="Views.finishWorkout(${workoutId})">Finish & Copy Session</button>
        </div>
      </div>`;
  }

  function renderExRow(ex, index, num, workoutId) {
    const logged = State.isExerciseLogged(index);
    const statusIcon = logged ? '✅' : '';
    const lastEntry = State.getLastEntry(ex.id);
    const trackingType = getEffectiveTrackingType(ex);

    let metaStr = '';
    if (trackingType === 'duration' || trackingType === 'completion') {
      metaStr = ex.reps;
    } else if (trackingType === 'sled') {
      metaStr = 'Sled';
    } else if (trackingType === 'weight_distance') {
      metaStr = `${ex.sets}×${ex.reps}`;
    } else {
      metaStr = `${ex.sets}×${ex.reps}`;
    }

    let lastStr = '';
    if (lastEntry) {
      if (lastEntry.sets?.[0]?.weight) lastStr = `Last: ${lastEntry.sets[0].weight}kg`;
      else if (lastEntry.sets?.[0]?.weightL) lastStr = `Last: L${lastEntry.sets[0].weightL}/R${lastEntry.sets[0].weightR}kg`;
      else if (lastEntry.weight) lastStr = `Last: ${lastEntry.weight}kg`;
    }

    return `
      <div class="ex-row" onclick="Router.go('/w/${workoutId}/e/${index}')">
        <span class="ex-num">${num}</span>
        <div class="ex-info">
          <span class="ex-name">${ex.name}${ex.isNew ? ' <span class="badge badge-new">NEW</span>' : ''}${ex.id === 'cable-chop' ? ` <span style="font-size:0.75rem;font-weight:400;">${Data.getChopDirection() === 'hi_lo' ? '🔄Hi→Lo' : '🔄Lo→Hi'}</span>` : ''}</span>

        </div>
        <span class="ex-status">${statusIcon}</span>
      </div>`;
  }

  // ---- Variant helpers ----
  function getActiveVariant(ex) {
    if (!ex.variants) return null;
    const savedId = Data.getVariant(ex.id);
    if (savedId) {
      const found = ex.variants.find(v => v.id === savedId);
      if (found) return found;
    }
    return ex.variants.find(v => v.isDefault) || ex.variants[0];
  }

  function getEffectiveTrackingType(ex) {
    const variant = getActiveVariant(ex);
    return variant?.trackingType || ex.trackingType || 'weight_reps';
  }

  function getStructuredCues(ex) {
    const cueData = FORM_CUES[ex.id];
    if (!cueData) return null;
    // Variant-keyed: check if it has setup/exec directly or variant sub-objects
    if (cueData.setup) return cueData;
    // Variant-keyed: resolve to active variant
    const variant = getActiveVariant(ex);
    if (variant && cueData[variant.id]) return cueData[variant.id];
    // Fallback: first key that has setup
    for (const k of Object.keys(cueData)) {
      if (cueData[k]?.setup) return cueData[k];
    }
    return null;
  }

  function renderStructuredCues(cues) {
    let html = '';
    if (cues.setup?.length) {
      html += `<div class="cue-label">Setup</div><ul class="cue-list">${cues.setup.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.exec?.length) {
      html += `<div class="cue-label">Do</div><ul class="cue-list">${cues.exec.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.mistakes?.length) {
      html += `<div class="cue-label">Don't</div><ul class="cue-list mistakes">${cues.mistakes.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.you?.length) {
      html += `<div class="cue-label">You</div><ul class="cue-list you">${cues.you.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    return html;
  }

  // ---- Last session display ----
  function formatLastEntry(lastEntry, ex) {
    if (!lastEntry) return '';
    let detail = '';
    if (lastEntry.done || lastEntry.doneL !== undefined) {
      detail = lastEntry.doneL !== undefined ? `L: ${lastEntry.doneL ? '✅' : '—'} R: ${lastEntry.doneR ? '✅' : '—'}` : (lastEntry.done ? '✅' : '—');
    } else if (lastEntry.sets && lastEntry.sets.length > 0) {
      const s0 = lastEntry.sets[0];
      if (s0.weightL !== undefined) {
        detail = lastEntry.sets.map(s => `L:${s.weightL||0}×${s.repsL||0} R:${s.weightR||0}×${s.repsR||0}`).join(', ');
      } else if (s0.repsL !== undefined) {
        detail = `${lastEntry.weight||0}kg — ` + lastEntry.sets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
      } else if (s0.lengths !== undefined) {
        detail = lastEntry.sets.map(s => `${s.weight||0}kg × ${s.lengths}L ${Timer.formatTime(s.timeSeconds||0)}`).join(', ');
      } else if (s0.distance !== undefined) {
        detail = lastEntry.sets.map(s => `${s.weight||0}kg/h × ${s.distance}m`).join(', ');
      } else {
        detail = lastEntry.sets.map(s => `${s.weight || 'BW'}kg × ${s.reps}`).join(', ');

    return `
      <div class="last-session">

  // ---- Type-specific renderers ----

  function renderWeightRepsSets(ex, existingData, preFill) {

  }

            oninput="Views._updateSledDerived();">
          <input type="text" class="set-input sled-time" inputmode="text" placeholder="m:ss" value="${timeStr}" data-set="${s}" id="sled-time-${s}">
          <button class="stopwatch-btn" id="sw-${s}" onclick="Timer.toggleStopwatch('sw-${s}', 'sled-time-${s}')">⏱️</button>
        </div>
        <div class="sled-derived" id="sled-derived-${s}">${lengths && sledLength ? `= ${Math.round(lengths * sledLength)}m` : ''}</div>`;
    }
    return html;
  }

  function renderWeightDistanceSets(ex, existingData, preFill) {
    const wLabel = ex.weightLabel || 'kg';
    const rLabel = ex.repsLabel || 'meters';
    let html = `<div class="sets-header" style="grid-template-columns:50px 1fr 30px 1fr;"><span></span><span>${wLabel}</span><span></span><span>${rLabel}</span></div>`;
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const weight = existing?.weight ?? (preFill.weight || '');
      const distance = existing?.distance ?? '';
      html += `
        <div class="wd-set-row">
          <span class="set-label">Set ${s + 1}</span>
          <input type="number" class="set-input wd-weight" inputmode="decimal" step="0.5" placeholder="${wLabel}" value="${weight}" data-set="${s}">
          <span class="set-x">×</span>
          <input type="number" class="set-input wd-distance" inputmode="numeric" step="1" placeholder="${rLabel}" value="${distance}" data-set="${s}">
        </div>`;
    }
    return html;
  }

  function renderVariantPills(ex) {
    if (!ex.variants) return '';
    const active = getActiveVariant(ex);
    return `<div class="variant-pills">${ex.variants.map(v =>
      `<button class="variant-pill ${v.id === active.id ? 'active' : ''}" onclick="Views.switchVariant('${ex.id}', '${v.id}')">${v.label}</button>`
    ).join('')}</div>`;
  }

  // Store current render context for re-rendering on variant switch
  let _currentRenderCtx = null;

  function switchVariant(exerciseId, variantId) {
    Data.setVariant(exerciseId, variantId);
    if (_currentRenderCtx) {
      renderExercise(_currentRenderCtx.workoutId, _currentRenderCtx.exIndex);
    }
  }

  function toggleChopDirection() {
    Data.flipChopDirection();
    if (_currentRenderCtx) {
      renderExercise(_currentRenderCtx.workoutId, _currentRenderCtx.exIndex);
    }
  }

  // ---- Main exercise detail view ----
  function renderExercise(workoutId, exIndex) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) { renderHome(); return; }
    const ex = workout.exercises[exIndex];
    if (!ex || ex.isFence) { renderWorkout(workoutId); return; }

    Timer.cleanup();
    _currentRenderCtx = { workoutId, exIndex };

    const totalEx = workout.exercises.filter(e => !e.isFence).length;
    const exNum = workout.exercises.slice(0, exIndex + 1).filter(e => !e.isFence).length;
    const trackingType = getEffectiveTrackingType(ex);
    const lastEntry = State.getLastEntry(ex.id);
    const existingData = State.getExerciseData(exIndex);
    const preFill = Progression.getPreFill(ex.id, ex);

    // Form cues — structured (FORM_CUES) or plain text fallback
    let cuesHtml = '';
    const structuredCues = getStructuredCues(ex);
    if (structuredCues || ex.formCues || ex.notes) {
      const cueContent = structuredCues
        ? renderStructuredCues(structuredCues)
        : (ex.formCues ? `<div style="margin-bottom:6px;">${ex.formCues}</div>` : '');
      cuesHtml = `
        <div class="cue-section collapsed" id="cue-section">
          <button class="cue-toggle" onclick="document.getElementById('cue-section').classList.toggle('collapsed')">Reference & Cues</button>
          <div class="cue-body">
            ${cueContent}
            ${ex.notes ? `<div style="color:var(--text3);font-style:italic;margin-top:6px;">${ex.notes}</div>` : ''}
          </div>
        </div>`;
    }

    // Superset info
    let ssInfo = '';
    if (ex.flow === 'SS' && ex.supersetWith) {
      const partner = workout.exercises.find(e => e.id === ex.supersetWith);
      if (partner) ssInfo = `<div style="font-size:0.85rem;color:var(--ss-color);margin-bottom:8px;"><span class="badge badge-ss">SS</span> with ${partner.name}</div>`;
    }

    // Variant pills
    const variantHtml = renderVariantPills(ex);

    // Chop direction (cable-chop only)
    let chopHtml = '';
    if (ex.id === 'cable-chop') {
      const dir = Data.getChopDirection();
      const label = dir === 'hi_lo' ? '🔄 Hi→Lo' : '🔄 Lo→Hi';
      const session = dir === 'hi_lo' ? 'Session A' : 'Session B';
      chopHtml = `<div class="chop-direction" onclick="Views.toggleChopDirection()">${label} <span style="font-weight:400;font-size:0.8rem;color:var(--text3);">(${session})</span></div>`;
    }

    // Type-specific inputs
    let inputsHtml = '';
    switch (trackingType) {
      case 'duration':
        inputsHtml = renderDurationExercise(ex, existingData); break;
      case 'completion':
        inputsHtml = renderCompletionExercise(ex, existingData); break;
      case 'sled':
        inputsHtml = renderSledSets(ex, existingData); break;
      case 'weight_distance':
        inputsHtml = renderWeightDistanceSets(ex, existingData, preFill); break;
      case 'reps_only':
        inputsHtml = renderRepsOnlySets(ex, existingData, preFill); break;
      case 'weight_reps': default:
        if (ex.unilateral === 'split_weight') inputsHtml = renderSplitWeightSets(ex, existingData, preFill);
        else if (ex.unilateral === 'split_reps') inputsHtml = renderSplitRepsSets(ex, existingData, preFill);
        else inputsHtml = renderWeightRepsSets(ex, existingData, preFill);
        break;
    }

    const existingNotes = existingData?.notes || '';

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Views.saveAndBack(${workoutId}, ${exIndex})">← Back</button>
        <h1>W${workoutId} — ${exNum}/${totalEx}</h1>
      </div>
      <div class="content ex-detail">
        <div class="ex-title">${ex.name}${ex.isNew ? ' <span class="badge badge-new">NEW</span>' : ''}</div>
        <div class="ex-target">${ex.sets} × ${ex.reps}${ex.repRange ? ` (range: ${ex.repRange[0]}-${ex.repRange[1]})` : ''}</div>
        ${ssInfo}
        ${variantHtml}
        ${chopHtml}
        ${cuesHtml}
        ${formatLastEntry(lastEntry, ex)}
        ${inputsHtml}
        <textarea class="notes-field" id="ex-notes" placeholder="Speak or type notes..."
          oninput="Views._triggerAutoSave()">${existingNotes}</textarea>
        <div id="progression-banner"></div>
      </div>
      <div class="save-bar">
        <button class="btn btn-primary" onclick="Views.saveExercise(${workoutId}, ${exIndex})">Save ✓</button>
      </div>`;

    // Add listeners for all inputs
    document.querySelectorAll('.weight-input, .reps-input, .wl-input, .wr-input, .rl-input, .rr-input, .shared-weight-input, .sled-weight, .sled-lengths, .sled-time, .wd-weight, .wd-distance').forEach(input => {
      input.addEventListener('input', () => {
        Views._triggerAutoSave();
        Views.updateBanner(ex);
      });
    });

    if (existingData) Views.updateBanner(ex);
  }

  // Trigger auto-save using stored context
  function _triggerAutoSave() {
    if (_currentRenderCtx) autoSaveExercise(_currentRenderCtx.workoutId, _currentRenderCtx.exIndex);
  }

  function _updateSledDerived() {
    const sledLength = Data.getSledLength();
    document.querySelectorAll('.sled-lengths').forEach(input => {
      const s = input.dataset.set;
      const lengths = parseFloat(input.value) || 0;
      const el = document.getElementById(`sled-derived-${s}`);
      if (el) el.textContent = lengths && sledLength ? `= ${Math.round(lengths * sledLength)}m` : '';
    });
    _triggerAutoSave();
  }

  // ---- Auto-save: collect data from DOM based on tracking type ----
  function autoSaveExercise(workoutId, exIndex) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) return;
    const ex = workout.exercises[exIndex];
    if (!ex) return;
    const trackingType = getEffectiveTrackingType(ex);
    const notes = document.getElementById('ex-notes')?.value || '';
    const variant = getActiveVariant(ex);
    const data = { notes };
    if (variant) data.variant = variant.id;

    switch (trackingType) {
      case 'duration': {
        if (ex.unilateral) {
          data.doneL = document.getElementById('done-l')?.value === 'true';
          data.doneR = document.getElementById('done-r')?.value === 'true';
        } else {
          data.done = document.getElementById('done-main')?.value === 'true';
        }
        break;
      }
      case 'completion': {
        if (ex.unilateral) {
          data.doneL = document.getElementById('done-l')?.value === 'true';
          data.doneR = document.getElementById('done-r')?.value === 'true';
        } else {
          data.done = document.getElementById('done-main')?.value === 'true';
        }
        break;
      }
      case 'sled': {
        data.sets = [];
        for (let s = 0; s < (ex.sets || 1); s++) {
          const w = document.querySelector(`.sled-weight[data-set="${s}"]`);
          const l = document.querySelector(`.sled-lengths[data-set="${s}"]`);
          const t = document.querySelector(`.sled-time[data-set="${s}"]`);
          const timeStr = t?.value || '';
          const parts = timeStr.split(':');
          const timeSeconds = parts.length === 2 ? (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0) : parseInt(timeStr) || 0;
          data.sets.push({
            weight: w ? parseFloat(w.value) || 0 : 0,
            lengths: l ? parseInt(l.value) || 0 : 0,
            timeSeconds
          });
        }
        break;
      }
      case 'weight_distance': {
        data.sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = document.querySelector(`.wd-weight[data-set="${s}"]`);
          const d = document.querySelector(`.wd-distance[data-set="${s}"]`);
          data.sets.push({
            weight: w ? parseFloat(w.value) || 0 : 0,
            distance: d ? parseInt(d.value) || 0 : 0
          });
        }
        break;
      }
      case 'reps_only': {
        data.sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const r = document.querySelector(`.reps-input[data-set="${s}"]`);
          data.sets.push({ reps: r ? (r.value === '' ? '' : parseInt(r.value) || r.value) : '' });
        }
        break;
      }
      case 'weight_reps': default: {
        if (ex.unilateral === 'split_weight') {
          data.sets = [];
          for (let s = 0; s < ex.sets; s++) {
            data.sets.push({
              weightL: parseFloat(document.querySelector(`.wl-input[data-set="${s}"]`)?.value) || 0,
              repsL: document.querySelector(`.rl-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rl-input[data-set="${s}"]`)?.value) || 0,
              weightR: parseFloat(document.querySelector(`.wr-input[data-set="${s}"]`)?.value) || 0,
              repsR: document.querySelector(`.rr-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rr-input[data-set="${s}"]`)?.value) || 0,
            });
          }
        } else if (ex.unilateral === 'split_reps') {
          data.weight = parseFloat(document.querySelector('.shared-weight-input')?.value) || 0;
          data.sets = [];
          for (let s = 0; s < ex.sets; s++) {
            data.sets.push({
              repsL: document.querySelector(`.rl-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rl-input[data-set="${s}"]`)?.value) || 0,
              repsR: document.querySelector(`.rr-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rr-input[data-set="${s}"]`)?.value) || 0,
            });
          }
        } else {
          data.sets = [];
          for (let s = 0; s < ex.sets; s++) {
            const wInput = document.querySelector(`.weight-input[data-set="${s}"]`);
            const rInput = document.querySelector(`.reps-input[data-set="${s}"]`);
            data.sets.push({
              weight: wInput ? parseFloat(wInput.value) || 0 : 0,
              reps: rInput ? (rInput.value === '' ? '' : parseInt(rInput.value) || rInput.value) : ''
            });
          }
        }
        break;
      }
    }

    State.logExercise(exIndex, data);
  }

  function saveExercise(workoutId, exIndex) {
    autoSaveExercise(workoutId, exIndex);
    Timer.cleanup();
    Router.go(`/w/${workoutId}`);
  }

  function saveAndBack(workoutId, exIndex) {
    autoSaveExercise(workoutId, exIndex);
    Timer.cleanup();
    Router.go(`/w/${workoutId}`);
  }

  function updateBanner(exercise) {
    const bannerEl = document.getElementById('progression-banner');
    if (!bannerEl) return;
    const trackingType = getEffectiveTrackingType(exercise);
    if (trackingType !== 'weight_reps' && trackingType !== 'reps_only') { bannerEl.innerHTML = ''; return; }

    const sets = [];
    if (exercise.unilateral === 'split_reps') {
      for (let s = 0; s < exercise.sets; s++) {
        const rl = document.querySelector(`.rl-input[data-set="${s}"]`);
        const rr = document.querySelector(`.rr-input[data-set="${s}"]`);
        if (rl?.value && rr?.value) sets.push({ repsL: rl.value, repsR: rr.value });
      }
    } else {
      for (let s = 0; s < exercise.sets; s++) {
        const rInput = document.querySelector(`.reps-input[data-set="${s}"]`);
        if (rInput?.value) sets.push({ reps: rInput.value });
      }
    }

    const banner = Progression.getBanner(sets, exercise);
    if (!banner) { bannerEl.innerHTML = ''; return; }
    const cls = banner.type === 'green' ? 'banner-green' : banner.type === 'amber' ? 'banner-amber' : 'banner-atg';
    const icon = banner.type === 'green' ? '✅ ' : banner.type === 'amber' ? '⚠️ ' : '💡 ';
    bannerEl.innerHTML = `<div class="progression-banner ${cls}">${icon}${banner.text}</div>`;
  }

  function finishWorkout(workoutId) {
    const session = State.finishSession();
    if (!session) return;
    // Flip chop direction after completing W6
    if (workoutId === 6) Data.flipChopDirection();
    // Store the index of this session for export tracking
    window._lastSessionIndex = Data.getSessions().length - 1;
    renderSummary(session);
  }

  function renderSummary(session) {
    const workout = PROGRAMME.find(w => w.id === session.workoutId);
    if (!workout) { renderHome(); return; }

    const md = Markdown.exportSession(session);

    let exerciseItems = '';
    for (const [idx, data] of Object.entries(session.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;

      let setsStr = '';
      if (data.done !== undefined || data.doneL !== undefined) {
        // Completion/duration
        if (data.doneL !== undefined) setsStr = `L: ${data.doneL ? '✅' : '—'} R: ${data.doneR ? '✅' : '—'}`;
        else setsStr = data.done ? '✅' : '—';
      } else if (data.sets && data.sets.length > 0) {
        const s0 = data.sets[0];
        if (s0.weightL !== undefined) {
          setsStr = data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L:${s.weightL||0}×${s.repsL||0} R:${s.weightR||0}×${s.repsR||0}`).join(' | ');
        } else if (s0.repsL !== undefined) {
          setsStr = `${data.weight||0}kg — ` + data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L${s.repsL}/R${s.repsR}`).join(' | ');
        } else if (s0.lengths !== undefined) {
          setsStr = data.sets.map(s => `${s.weight||0}kg × ${s.lengths}L @ ${Timer.formatTime(s.timeSeconds||0)}`).join(' | ');
        } else if (s0.distance !== undefined) {
          setsStr = data.sets.filter(s => s.distance).map(s => `${s.weight||0}kg/h × ${s.distance}m`).join(' | ');
        } else {
          setsStr = data.sets.filter(s => s.reps !== '' && s.reps !== undefined).map(s => `${s.weight || 'BW'}kg × ${s.reps}`).join(' | ');
        }
      }

      const variantLabel = data.variant ? ` [${data.variant}]` : '';

      exerciseItems += `
        <div class="summary-item">
          <div class="summary-name">${ex.name}${variantLabel}</div>
          <div class="summary-sets">${setsStr}</div>
          ${data.notes ? `<div class="summary-notes">${data.notes}</div>` : ''}
        </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <h1>Session Complete</h1>
      </div>
      <div class="content">
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:2rem;">💪</div>
          <div style="font-size:1.1rem;font-weight:600;">W${session.workoutId} — ${workout.name}</div>
          <div style="color:var(--text2);margin-top:4px;">${Markdown.formatDate(session.date)}</div>
        </div>

        ${session.overall ? `<div class="summary-section"><h3>Overall</h3><div class="summary-item">${session.overall}</div></div>` : ''}
        ${session.injuries ? `<div class="summary-section"><h3>Injuries / Concerns</h3><div class="summary-item" style="color:var(--amber);">${session.injuries}</div></div>` : ''}

        <div class="summary-section">
          <h3>Exercises</h3>
          ${exerciseItems}
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
          <button class="btn btn-primary" onclick="Views.copyMarkdown()">Copy as Markdown</button>
          <button class="btn btn-secondary" onclick="Views.shareMarkdown()">Share</button>
          <button class="btn btn-secondary" onclick="Router.go('/')">Done — Back to Home</button>
        </div>
      </div>`;

    // Store markdown for copy/share
    window._lastMarkdown = md;
  }

  async function copyMarkdown() {
    try {
      await navigator.clipboard.writeText(window._lastMarkdown || '');
      if (window._lastSessionIndex !== undefined) Data.markExported(window._lastSessionIndex);
      alert('Copied to clipboard!');
    } catch {
      prompt('Copy this markdown:', window._lastMarkdown || '');
    }
  }

  async function shareMarkdown() {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Workout Session',
          text: window._lastMarkdown || ''
        });
        if (window._lastSessionIndex !== undefined) Data.markExported(window._lastSessionIndex);
      } catch { /* user cancelled */ }
    } else {
      copyMarkdown();
    }
  }

  function exportAll() {
    const md = Markdown.exportAll();
    window._lastMarkdown = md;
    if (navigator.share) {
      navigator.share({ title: 'Training Log', text: md }).catch(() => {});
    } else {
      navigator.clipboard.writeText(md)
        .then(() => alert('All sessions copied to clipboard!'))
        .catch(() => prompt('Copy:', md));
    }
  }

  function showImportModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'import-modal';
    overlay.innerHTML = `
      <div class="modal">
        <h2>Load History</h2>
        <p style="font-size:0.85rem;color:var(--text2);margin-bottom:10px;">
          Paste your training-log.md content below. Sessions will be added to your history.
        </p>
        <textarea id="import-text" placeholder="Paste markdown here..."></textarea>
        <div id="import-result"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="document.getElementById('import-modal').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="Views.doImport()">Import</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove();
    });
  }

  function doImport() {
    const text = document.getElementById('import-text')?.value;
    if (!text) return;

    const result = Markdown.importMarkdown(text);
    const resultEl = document.getElementById('import-result');

    if (result.sessions.length === 0) {
      resultEl.innerHTML = `<div class="import-result" style="background:var(--red-bg);color:var(--red);">No sessions found. Check the format.</div>`;
      return;
    }

    // Add sessions to storage
    const existing = Data.getSessions();
    const combined = [...existing, ...result.sessions];
    Data.saveSessions(combined);

    let msg = `Imported ${result.sessions.length} session(s), ${result.matched} exercise(s) matched.`;
    if (result.unmatched > 0) {
      msg += ` ${result.unmatched} exercise(s) could not be matched: ${result.unmatchedNames.join(', ')}`;
    }

    resultEl.innerHTML = `<div class="import-result" style="background:var(--green-bg);color:var(--green);">${msg}</div>`;

    // Re-init state to pick up new history
    State.init();

    setTimeout(() => {
      document.getElementById('import-modal')?.remove();
      renderHome();
    }, 2000);
  }

  function renderSettings() {
    const sessions = Data.getSessions();

    let sessionRows = '';
    if (sessions.length === 0) {
      sessionRows = '<div style="color:var(--text3);text-align:center;padding:20px;">No sessions recorded yet.</div>';
    } else {
      // Show newest first
      for (let i = sessions.length - 1; i >= 0; i--) {
        const s = sessions[i];
        const workout = PROGRAMME.find(w => w.id === s.workoutId);
        const wName = workout ? workout.name : `Workout ${s.workoutId}`;
        const exCount = Object.keys(s.exercises).length;
        const exported = s.exported ? '✅' : '⚠️';

        sessionRows += `
          <div class="summary-item" style="display:flex;align-items:center;gap:10px;">
            <div style="flex:1;">
              <div class="summary-name">${exported} W${s.workoutId} — ${Markdown.formatDate(s.date)}</div>
              <div class="summary-sets">${wName} · ${exCount} exercises${s.exported ? ' · Exported' : ' · Not exported'}</div>
            </div>
            <button class="btn btn-secondary" style="flex:none;padding:8px 12px;font-size:0.8rem;width:auto;" onclick="Views.exportSingleSession(${i})">Export</button>
          </div>`;
      }
    }

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Router.go('/')">← Home</button>
        <h1>Settings & History</h1>
      </div>
      <div class="content">
        <div class="summary-section">
          <h3>Session History (${sessions.length} total)</h3>
          ${sessionRows}
        </div>

        <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-secondary" onclick="Views.exportAll()">Export All Sessions</button>
          <button class="btn btn-secondary" onclick="Views.showImportModal()">Load History (Import)</button>
        </div>

        <div style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text3);">
          Exercise Tracker v1.0
        </div>
      </div>`;
  }

  function exportSingleSession(sessionIndex) {
    const sessions = Data.getSessions();
    const session = sessions[sessionIndex];
    if (!session) return;

    const md = Markdown.exportSession(session);
    window._lastMarkdown = md;
    window._lastSessionIndex = sessionIndex;

    if (navigator.share) {
      navigator.share({ title: 'Workout Session', text: md })
        .then(() => {
          Data.markExported(sessionIndex);
          renderSettings(); // refresh to show updated export status
        })
        .catch(() => {});
    } else {
      navigator.clipboard.writeText(md)
        .then(() => {
          Data.markExported(sessionIndex);
          alert('Session copied to clipboard!');
          renderSettings();
        })
        .catch(() => prompt('Copy:', md));
    }
  }

  return { renderHome, renderWorkout, renderExercise, autoSaveExercise, saveExercise, saveAndBack, updateBanner, finishWorkout, renderSummary, copyMarkdown, shareMarkdown, exportAll, showImportModal, doImport, renderSettings, exportSingleSession, switchVariant, toggleChopDirection, _triggerAutoSave, _updateSledDerived };
})();

// =====================================================
// ROUTER — hash-based SPA routing
// =====================================================
const Router = (function() {
  function parseHash() {
    const hash = location.hash.slice(1) || '/';
    const parts = hash.split('/').filter(Boolean);

    if (parts[0] === 'w' && parts.length === 2) {
      return { view: 'workout', workoutId: parseInt(parts[1]) };
    }
    if (parts[0] === 'w' && parts[1] && parts[2] === 'e' && parts[3] !== undefined) {
      return { view: 'exercise', workoutId: parseInt(parts[1]), exIndex: parseInt(parts[3]) };
    }
    if (parts[0] === 'w' && parts[1] && parts[2] === 'summary') {
      return { view: 'summary', workoutId: parseInt(parts[1]) };
    }
    if (parts[0] === 'settings') {
      return { view: 'settings' };
    }
    return { view: 'home' };
  }

  function route() {
    const r = parseHash();
    switch (r.view) {
      case 'workout': Views.renderWorkout(r.workoutId); break;
      case 'exercise': Views.renderExercise(r.workoutId, r.exIndex); break;
      case 'settings': Views.renderSettings(); break;
      case 'home': default: Views.renderHome(); break;
    }
  }

  function go(path) {
    location.hash = path;
  }

  function init() {
    window.addEventListener('hashchange', route);
    route();
  }

  return { init, go };
})();

// =====================================================
// APP INIT
// =====================================================
(function() {
  State.init();
  Router.init();
})();
</script>
