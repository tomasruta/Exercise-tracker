// =====================================================
// STATE MODULE — working session + history lookups
// =====================================================
const State = (function() {
  let wip = null;

  function init() {
    wip = Data.getWIP();
  }

  function startSession(workoutId) {
    wip = {
      workoutId,
      date: new Date().toISOString().slice(0, 10),
      exercises: {},
      overall: '',
      injuries: '',
      gym: Data.getLastGym(),
    };
    Data.saveWIP(wip);
    return wip;
  }

  function startTimer() {
    if (!wip || wip.startedAt) return;
    wip.startedAt = new Date().toISOString();
    Data.saveWIP(wip);
  }

  function endTimer() {
    if (!wip || wip.completedAt) return;
    wip.completedAt = new Date().toISOString();
    Data.saveWIP(wip);
  }

  function getWIP() { return wip; }

  function hasWIP() { return wip !== null; }

  function logExercise(exIndex, data) {
    if (!wip) return;
    wip.exercises[exIndex] = data;
    Data.saveWIP(wip);
  }

  function updateSessionNotes(overall, injuries, gym) {
    if (!wip) return;
    wip.overall = overall;
    wip.injuries = injuries;
    if (gym !== undefined) { wip.gym = gym; Data.setLastGym(gym); }
    Data.saveWIP(wip);
  }

  function getExerciseData(exIndex) {
    if (!wip || !wip.exercises[exIndex]) return null;
    return wip.exercises[exIndex];
  }

  function getExerciseCompletionStatus(exIndex, expectedSets) {
    if (!wip || !wip.exercises[exIndex]) return { status: 'none', filled: 0, total: expectedSets || 0 };
    const data = wip.exercises[exIndex];

    // Multi-timer type
    if (data.timerSteps !== undefined) {
      const filled = data.timerSteps.filter(s => s.done).length;
      const total = data.timerSteps.length || expectedSets || 4;
      return { status: filled >= total ? 'complete' : filled > 0 ? 'partial' : 'none', filled, total };
    }

    // Completion type (done/doneL/doneR)
    if (data.done !== undefined && data.doneL === undefined && data.timerSteps === undefined) {
      return { status: data.done ? 'complete' : 'none', filled: data.done ? 1 : 0, total: 1 };
    }
    if (data.doneL !== undefined) {
      const filled = (data.doneL ? 1 : 0) + (data.doneR ? 1 : 0);
      return { status: filled === 2 ? 'complete' : filled > 0 ? 'partial' : 'none', filled, total: 2 };
    }

    // Set-based types
    if (!data.sets || data.sets.length === 0) return { status: 'none', filled: 0, total: expectedSets || 0 };

    const total = expectedSets || data.sets.length;
    let filled = 0;
    for (const s of data.sets) {
      if (s.lengths) { filled++; continue; }
      if (s.distance) { filled++; continue; }
      if (s.reps !== null && s.reps !== undefined && s.reps !== '' && parseInt(s.reps) !== 0) { filled++; continue; }
      if (s.repsL !== null && s.repsL !== undefined && s.repsL !== '') { filled++; continue; }
    }
    const status = filled === 0 ? 'none' : filled >= total ? 'complete' : 'partial';
    return { status, filled, total };
  }

  function isExerciseLogged(exIndex) {
    return getExerciseCompletionStatus(exIndex).status !== 'none';
  }

  function finishSession() {
    if (!wip) return null;
    if (!wip.completedAt) wip.completedAt = new Date().toISOString();
    Data.addSession(wip);
    const finished = { ...wip };
    wip = null;
    Data.clearWIP();
    return finished;
  }

  function abandonSession() {
    wip = null;
    Data.clearWIP();
  }

  // Resolve an exercise ID through the alias map
  function resolveId(id) {
    return ID_ALIASES[id] || id;
  }

  // Find last entry for a given exercise ID across all sessions
  // Checks both current ID and any aliases (for backward compat with old sled IDs etc.)
  function getLastEntry(exerciseId) {
    const targetId = resolveId(exerciseId);
    const sessions = Data.getSessions();
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      const workout = PROGRAMME.find(w => w.id === s.workoutId);
      if (!workout) continue;
      for (const [idx, data] of Object.entries(s.exercises)) {
        const ex = workout.exercises[parseInt(idx)];
        if (!ex) continue;
        const exResolved = resolveId(ex.id);
        if (exResolved === targetId && (
          (data.sets && data.sets.length > 0) ||
          data.done || data.doneL || data.doneR
        )) {
          return { date: s.date, workoutId: s.workoutId, ...data };
        }
      }
    }
    return null;
  }

  function getExerciseHistory(exerciseId) {
    const targetId = resolveId(exerciseId);
    const sessions = Data.getSessions();
    const results = [];
    for (let i = sessions.length - 1; i >= 0; i--) {
      const s = sessions[i];
      const workout = PROGRAMME.find(w => w.id === s.workoutId);
      if (!workout) continue;
      for (const [idx, data] of Object.entries(s.exercises)) {
        const ex = workout.exercises[parseInt(idx)];
        if (!ex) continue;
        if (resolveId(ex.id) === targetId && (
          (data.sets && data.sets.length > 0) || data.done || data.doneL || data.doneR
        )) {
          results.push({ date: s.date, workoutId: s.workoutId, data, exercise: ex });
        }
      }
    }
    return results;
  }

  return { init, startSession, startTimer, endTimer, getWIP, hasWIP, logExercise, updateSessionNotes, getExerciseData, isExerciseLogged, getExerciseCompletionStatus, finishSession, abandonSession, getLastEntry, getExerciseHistory };
})();

// =====================================================
// PROGRESSION MODULE — auto-bump + banners
// =====================================================
const Progression = (function() {

  function getWeightStep(progressionType) {
    if (progressionType === 'compound') return 2.5;
    if (progressionType === 'isolation') return 1;
    return 0;
  }

  function shouldAutoBump(lastSets, repRange, unilateral) {
    if (!repRange || !lastSets || lastSets.length === 0) return false;
    const top = repRange[1];
    if (unilateral === 'split_reps') {
      // Both sides must hit top on ALL sets
      return lastSets.every(s => {
        const l = parseInt(s.repsL); const r = parseInt(s.repsR);
        return !isNaN(l) && l >= top && !isNaN(r) && r >= top;
      });
    }
    return lastSets.every(s => {
      const r = parseInt(s.reps);
      return !isNaN(r) && r >= top;
    });
  }

  function getPreFill(exerciseId, exercise) {
    const last = State.getLastEntry(exerciseId);
    const result = { weight: '', weightL: '', weightR: '', bumped: false, from: null };
    if (!last || !last.sets || last.sets.length === 0) return result;

    if (exercise.unilateral === 'split_weight') {
      result.weightL = last.sets[0].weightL || '';
      result.weightR = last.sets[0].weightR || '';
      return result;
    }

    if (exercise.unilateral === 'split_reps') {
      // New format: per-set weight; old format: shared last.weight
      const lastWeight = last.sets[0]?.weight ?? last.weight ?? 0;
      if (exercise.repRange && shouldAutoBump(last.sets, exercise.repRange, 'split_reps')) {
        const step = getWeightStep(exercise.progressionType);
        if (step > 0) {
          return { ...result, weight: lastWeight + step, bumped: true, from: lastWeight };
        }
      }
      return { ...result, weight: lastWeight || '' };
    }

    const lastWeight = last.sets[0].weight || 0;
    if (exercise.repRange && shouldAutoBump(last.sets, exercise.repRange)) {
      const step = getWeightStep(exercise.progressionType);
      if (step > 0) {
        return { ...result, weight: lastWeight + step, bumped: true, from: lastWeight };
      }
    }
    return { ...result, weight: lastWeight || '' };
  }

  function getBanner(sets, exercise) {
    if (!exercise.progressionType) return null;
    if (exercise.progressionType === 'atg') {
      return { type: 'atg', text: 'Add load when form is solid' };
    }
    if (!exercise.repRange) return null;

    const [low, high] = exercise.repRange;

    // Unilateral split_reps: check both sides
    if (exercise.unilateral === 'split_reps') {
      const validSets = sets.filter(s => s.repsL !== undefined && s.repsL !== '' && s.repsR !== undefined && s.repsR !== '');
      if (validSets.length === 0) return null;
      const lAllTop = validSets.every(s => parseInt(s.repsL) >= high);
      const rAllTop = validSets.every(s => parseInt(s.repsR) >= high);
      const lAnyBelow = validSets.some(s => parseInt(s.repsL) < low);
      const rAnyBelow = validSets.some(s => parseInt(s.repsR) < low);

      if (lAllTop && rAllTop) {
        const step = getWeightStep(exercise.progressionType);
        const label = step > 0 ? `+${step}kg` : '';
        return { type: 'green', text: `Both sides at ${high} — add ${label} next session` };
      }
      if (lAnyBelow || rAnyBelow) {
        const lStatus = lAllTop ? 'All at ' + high : 'Below';
        const rStatus = rAllTop ? 'All at ' + high : 'Below';
        return { type: 'amber', text: `L: ${lStatus} · R: ${rStatus} — stay at this weight` };
      }
      return null;
    }

    const validSets = sets.filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '');
    if (validSets.length === 0) return null;

    const allAtTop = validSets.every(s => parseInt(s.reps) >= high);
    const anyBelowBottom = validSets.some(s => parseInt(s.reps) < low);

    if (allAtTop) {
      const step = getWeightStep(exercise.progressionType);
      const label = step > 0 ? `+${step}kg` : '';
      return { type: 'green', text: `All sets at ${high} — add ${label} next session` };
    }
    if (anyBelowBottom) {
      return { type: 'amber', text: `Below range — stay at this weight` };
    }
    return null;
  }

  return { getPreFill, getBanner, shouldAutoBump };
})();

// =====================================================
// MARKDOWN MODULE — export + import
// =====================================================
const Markdown = (function() {

  function formatDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
  }

  function resolveDisplayName(ex, data) {
    if (!data.variant || !ex.variants) return ex.name;
    const variant = ex.variants.find(v => v.id === data.variant);
    if (!variant || variant.isDefault) return ex.name;
    return variant.label;
  }

  function formatNotes(notes) {
    if (!notes) return '';
    const lines = notes.split('\n').filter(l => l.trim());
    return lines.map((line, i) => i === 0 ? `  - ${line}\n` : `    ${line}\n`).join('');
  }

  function exportSession(session) {
    const workout = PROGRAMME.find(w => w.id === session.workoutId);
    if (!workout) return '';

    let md = `## ${formatDate(session.date)} — Workout ${workout.id} (${workout.name})\n\n`;

    if (session.gym) md += `**Gym:** ${session.gym}\n`;
    if (session.startedAt) {
      const startTime = Timer.formatTimeOfDay(session.startedAt);
      if (session.completedAt) {
        const endTime = Timer.formatTimeOfDay(session.completedAt);
        const durStr = Timer.formatDuration(new Date(session.completedAt) - new Date(session.startedAt));
        md += `**Time:** ${startTime} → ${endTime} (${durStr})\n`;
      } else {
        md += `**Time:** ${startTime}\n`;
      }
    }
    if (session.overall) md += `**Overall:** ${session.overall}\n`;
    if (session.injuries) md += `**Injuries:** ${session.injuries}\n`;
    if (session.gym || session.startedAt || session.overall || session.injuries) md += '\n';

    for (const [idx, data] of Object.entries(session.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;

      const displayName = resolveDisplayName(ex, data);
      const wLabel = ex.weightLabel || 'kg';
      // Resolve variant overrides for repRange
      const activeVariant = data.variant && ex.variants ? ex.variants.find(v => v.id === data.variant) : null;
      const effectiveRepRange = activeVariant?.repRange || ex.repRange;

      // Multi-timer exercises
      if (data.timerSteps !== undefined) {
        const doneCount = data.timerSteps.filter(s => s.done).length;
        const totalCount = ex.timerSequence ? ex.timerSequence.length : data.timerSteps.length;
        const stepDetails = data.timerSteps.map((s, i) => {
          const label = ex.timerSequence?.[i]?.label || `Step ${i+1}`;
          return s.done ? `${label}: ${s.time}s` : `${label}: —`;
        }).join(', ');
        md += `- **${displayName}** — ${doneCount}/${totalCount} positions (${stepDetails})\n`;
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      // Duration/completion exercises
      if (data.done !== undefined || data.doneL !== undefined) {
        if (data.doneL !== undefined) {
          const tL = data.timeL ? `(${data.timeL}s)` : '';
          const tR = data.timeR ? `(${data.timeR}s)` : '';
          md += `- **${displayName}** — L${data.doneL ? '✅' : '—'}${tL} R${data.doneR ? '✅' : '—'}${tR}\n`;
        } else {
          const t = data.time ? `(${data.time}s)` : '';
          md += `- **${displayName}** — ${data.done ? '✅' : '—'}${t}\n`;
        }
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      if (!data.sets || data.sets.length === 0) continue;
      const s0 = data.sets[0];

      // Sled
      if (s0.lengths !== undefined) {
        const sledLength = Data.getSledLength();
        for (const s of data.sets) {
          const dist = s.lengths * sledLength;
          md += `- **${displayName}** — 1×(${s.lengths} lengths, ${Timer.formatTime(s.timeSeconds||0)}) @ ${s.weight||0}kg (length = ${sledLength}m, total ~${Math.round(dist)}m)\n`;
        }
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      // Weight/distance (farmer's carry)
      if (s0.distance !== undefined) {
        const validSets = data.sets.filter(s => s.distance);
        const weights = validSets.map(s => parseFloat(s.weight) || 0);
        const allSameWeight = weights.length > 0 && weights.every(w => Math.abs(w - weights[0]) < 0.01);
        let setsStr, weightStr;
        if (allSameWeight) {
          setsStr = validSets.map(s => s.distance + 'm').join(', ');
          weightStr = ` @ ${weights[0]}${wLabel}`;
        } else {
          setsStr = validSets.map(s => `${s.distance}m @${s.weight||0}`).join(', ');
          weightStr = ` ${wLabel}`;
        }
        md += `- **${displayName}** — ${validSets.length}×(${setsStr})${weightStr}\n`;
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      // Unilateral split_weight
      if (s0.weightL !== undefined) {
        const validSets = data.sets.filter(s => s.repsL !== '' || s.repsR !== '');
        const setsStr = validSets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
        const allSameW = validSets.every(s => s.weightL === validSets[0].weightL && s.weightR === validSets[0].weightR);
        const wStr = allSameW
          ? ` @ L:${validSets[0]?.weightL||0}${wLabel} R:${validSets[0]?.weightR||0}${wLabel}`
          : ` @ varies`;
        md += `- **${displayName}** — ${validSets.length}×(${setsStr})${wStr}\n`;
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      // Unilateral split_reps
      if (s0.repsL !== undefined) {
        const validSets = data.sets.filter(s => s.repsL !== '' || s.repsR !== '');
        if (s0.weight !== undefined) {
          // New format: per-set weight
          const weights = validSets.map(s => parseFloat(s.weight) || 0);
          const allSameW = weights.length > 0 && weights.every(w => Math.abs(w - weights[0]) < 0.01);
          if (allSameW) {
            const setsStr = validSets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
            md += `- **${displayName}** — ${validSets.length}×(${setsStr}) @ ${weights[0]}${wLabel}\n`;
          } else {
            const setsStr = validSets.map(s => `${s.weight||0}${wLabel} L${s.repsL}/R${s.repsR}`).join(', ');
            md += `- **${displayName}** — ${setsStr}\n`;
          }
        } else {
          // Old format: shared weight
          const setsStr = validSets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
          const weight = parseFloat(data.weight) || 0;
          md += `- **${displayName}** — ${validSets.length}×(${setsStr}) @ ${weight}${wLabel}\n`;
        }
        md += formatNotes(data.notes);
        md += '\n';
        continue;
      }

      // Standard weight×reps or reps_only — filter empty/zero sets
      const validSets = data.sets.filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '' && parseInt(s.reps) !== 0);
      if (validSets.length === 0) continue;

      const weights = validSets.map(s => parseFloat(s.weight) || 0);
      const allSameWeight = weights.length > 0 && weights.every(w => Math.abs(w - weights[0]) < 0.01);
      let setsStr, weightStr;
      if (allSameWeight) {
        setsStr = validSets.map(s => s.reps).join(', ');
        weightStr = weights[0] ? ` @ ${weights[0]}${wLabel}` : ' @ BW';
      } else {
        setsStr = validSets.map(s => `${s.reps} @${parseFloat(s.weight)||0}`).join(', ');
        weightStr = ` ${wLabel}`;
      }

      md += `- **${displayName}** — ${validSets.length}×(${setsStr})${weightStr}\n`;

      // Flag rep discrepancies vs target range
      if (effectiveRepRange) {
        const [low, high] = effectiveRepRange;
        const repValues = validSets.map(s => parseInt(s.reps)).filter(r => !isNaN(r));
        const over = repValues.filter(r => r > high);
        const under = repValues.filter(r => r < low);
        if (over.length > 0) md += `  - ⬆️ ${over.length} set${over.length > 1 ? 's' : ''} above target ${high} reps\n`;
        if (under.length > 0) md += `  - ⬇️ ${under.length} set${under.length > 1 ? 's' : ''} below target ${low} reps\n`;
      }

      md += formatNotes(data.notes);
      md += '\n';
    }

    return md;
  }

  function exportAll() {
    const sessions = Data.getSessions();
    if (sessions.length === 0) return '# Training Log\n\nNo sessions recorded yet.\n';
    let md = '# Training Log\n\n';
    // Sort by date ascending
    const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));
    for (const s of sorted) {
      md += exportSession(s);
      md += '---\n\n';
    }
    return md;
  }

  // Build lookup map for fuzzy matching (includes old names via aliases + variant labels)
  function buildLookup() {
    const map = {};
    for (const w of PROGRAMME) {
      for (let i = 0; i < w.exercises.length; i++) {
        const ex = w.exercises[i];
        if (ex.isFence) continue;
        const norm = ex.name.toLowerCase().replace(/[^a-z0-9]/g, '');
        if (!map[norm]) map[norm] = { id: ex.id, name: ex.name };
        // Add variant labels so exported variant names can be re-imported
        if (ex.variants) {
          for (const v of ex.variants) {
            const vNorm = v.label.toLowerCase().replace(/[^a-z0-9]/g, '');
            if (!map[vNorm]) map[vNorm] = { id: ex.id, name: ex.name, variantId: v.id };
          }
        }
      }
    }
    // Add old names that map to new IDs
    const oldNames = {
      'reversesleddedmilling': 'sled',
      'reversesled': 'sled',
      'pushpullsled': 'sled',
      'atgsplitsquat': 'atg-split-squat',
      'atglunge': 'atg-lunge',
      'atglungewalking': 'atg-lunge',
      'singlelegcalfraise': 'sl-calf-raise',
      'slcalfraise': 'sl-calf-raise',
      'slcalfraisestanding': 'sl-calf-raise',
    };
    for (const [norm, id] of Object.entries(oldNames)) {
      if (!map[norm]) {
        const ex = PROGRAMME.flatMap(w => w.exercises).find(e => e.id === id);
        if (ex) map[norm] = { id: ex.id, name: ex.name };
      }
    }
    return map;
  }

  const LOOKUP = buildLookup();

  function matchExercise(name) {
    const norm = name.toLowerCase().replace(/[^a-z0-9]/g, '');
    // Exact match
    if (LOOKUP[norm]) return LOOKUP[norm];
    // Partial match
    for (const [key, val] of Object.entries(LOOKUP)) {
      if (key.includes(norm) || norm.includes(key)) return val;
    }
    return null;
  }

  function importMarkdown(text) {
    const sessions = [];
    const blocks = text.split(/^## /m).filter(b => b.trim());
    let matched = 0, unmatched = 0, unmatchedNames = [];

    for (const block of blocks) {
      const lines = block.split('\n');
      // Parse date and workout number
      const headerMatch = lines[0].match(/(\d{1,2}\s+\w+\s+\d{4}).*?Workout\s*(\d)/i);
      if (!headerMatch) continue;

      const dateStr = headerMatch[1];
      const workoutId = parseInt(headerMatch[2]);
      // Parse to YYYY-MM-DD (use local date to avoid timezone shifts)
      const d = new Date(dateStr + ' 12:00:00');
      const date = isNaN(d.getTime()) ? dateStr : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

      const workout = PROGRAMME.find(w => w.id === workoutId);
      if (!workout) continue;

      const session = { workoutId, date, startedAt: '', exercises: {}, overall: '', injuries: '', gym: '' };

      // Parse gym/overall/injuries
      for (const line of lines) {
        const gymMatch = line.match(/\*\*Gym:\*\*\s*(.+)/);
        if (gymMatch) session.gym = gymMatch[1];
        const overallMatch = line.match(/\*\*Overall:\*\*\s*(.+)/);
        if (overallMatch) session.overall = overallMatch[1];
        const injuryMatch = line.match(/\*\*Injur\w*:\*\*\s*(.+)/);
        if (injuryMatch) session.injuries = injuryMatch[1];
      }

      // Parse exercises
      let currentExNotes = null;
      for (const line of lines) {
        const noteMatch = line.match(/^\s+-\s+(.+)/);

        // Try each format in order of specificity
        let parsed = null;
        let exName = null;
        let variantId = null;

        // Extract exercise name (with optional variant)
        const nameMatch = line.match(/^-\s+\*\*(.+?)\*\*\s*(?:\[(\w[\w-]*)\])?\s*—\s*(.*)/);
        if (nameMatch) {
          exName = nameMatch[1];
          variantId = nameMatch[2] || null;
          const rest = nameMatch[3].trim();

          // 1. Completion unilateral: L✅(52s) R—(0s) or L✅ R✅
          const compUni = rest.match(/^L([✅—])(?:\((\d+)s\))?\s*R([✅—])(?:\((\d+)s\))?$/);
          if (compUni) {
            parsed = { doneL: compUni[1] === '✅', doneR: compUni[3] === '✅' };
            if (compUni[2]) parsed.timeL = parseInt(compUni[2]);
            if (compUni[4]) parsed.timeR = parseInt(compUni[4]);
          }

          // 2. Completion bilateral: ✅(48s) or just ✅ or —
          if (!parsed) {
            const compBi = rest.match(/^([✅—])(?:\((\d+)s\))?$/);
            if (compBi) {
              parsed = { done: compBi[1] === '✅' };
              if (compBi[2]) parsed.time = parseInt(compBi[2]);
            }
          }

          // 3. Sled: 1×(8 lengths, 2:30) @ 30kg (length = 15m, total ~120m)  [also accepts [] for compat]
          if (!parsed) {
            const sledMatch = rest.match(/^\d+×[\[(](\d+)\s*lengths?,\s*(\d+:\d{2})[\])]\s*@\s*([\d.]+)kg\s*\(length\s*=\s*([\d.]+)m/);
            if (sledMatch) {
              const timeParts = sledMatch[2].split(':');
              const timeSeconds = parseInt(timeParts[0]) * 60 + parseInt(timeParts[1]);
              parsed = { sets: [{ weight: parseFloat(sledMatch[3]), lengths: parseInt(sledMatch[1]), timeSeconds }] };
            }
          }

          // 4. Weight/distance: 3×(40m,35m,30m) @ 22kg/hand
          if (!parsed) {
            const wdMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*@\s*([\d.]+)kg/);
            if (wdMatch && wdMatch[2].includes('m') && !wdMatch[2].includes('/')) {
              const distances = wdMatch[2].split(',').map(d => parseInt(d.trim()));
              parsed = { sets: distances.map(d => ({ weight: parseFloat(wdMatch[3]), distance: d })) };
            }
          }

          // 5. Split_weight: 3×(L10/R10,L8/R9) @ L:5kg R:5kg
          if (!parsed) {
            const swMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*@\s*L:([\d.]+)kg\s*R:([\d.]+)kg/);
            if (swMatch) {
              const pairs = swMatch[2].split(',').map(p => {
                const lr = p.trim().match(/L(\d+)\/R(\d+)/);
                return lr ? { weightL: parseFloat(swMatch[3]), repsL: parseInt(lr[1]), weightR: parseFloat(swMatch[4]), repsR: parseInt(lr[2]) } : null;
              }).filter(Boolean);
              parsed = { sets: pairs };
            }
          }

          // 6. Split_reps: 5×(L6/R8,L7/R7) @ 20kg
          if (!parsed) {
            const srMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*@\s*([\d.]+)kg/);
            if (srMatch && srMatch[2].includes('L') && srMatch[2].includes('/R')) {
              const pairs = srMatch[2].split(',').map(p => {
                const lr = p.trim().match(/L(\d+)\/R(\d+)/);
                return lr ? { repsL: parseInt(lr[1]), repsR: parseInt(lr[2]) } : null;
              }).filter(Boolean);
              parsed = { weight: parseFloat(srMatch[3]), sets: pairs };
            }
          }

          // 7a. Per-set weights: 3×(6 @41.3, 6 @40, 6 @38) kg
          if (!parsed) {
            const perSetMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*(\w+)?/);
            if (perSetMatch && perSetMatch[2].includes('@')) {
              const entries = perSetMatch[2].split(',').map(e => {
                const parts = e.trim().split(/\s*@/);
                return { reps: parseInt(parts[0]) || parts[0].trim(), weight: parseFloat(parts[1]) || 0 };
              });
              parsed = { sets: entries };
            }
          }

          // 7b. Standard weight×reps: 5×(6,8,6) @ 50kg or @ BW
          if (!parsed) {
            const stdMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*@\s*([\d.]+)/);
            const bwMatch = rest.match(/^(\d+)×[\[(]([^\])]+)[\])]\s*@\s*BW/);
            const m = stdMatch || bwMatch;
            if (m) {
              const repsArr = m[2].split(',').map(r => r.trim());
              const weight = stdMatch ? parseFloat(m[3]) : 0;
              parsed = { sets: repsArr.map(r => ({ weight, reps: parseInt(r) || r })) };
            }
          }
        }

        if (parsed && exName) {
          const matched_ = matchExercise(exName);
          if (matched_) {
            const exIdx = workout.exercises.findIndex(e => e.id === matched_.id);
            if (exIdx >= 0) {
              parsed.notes = '';
              // Variant from brackets OR from variant-label match
              if (variantId) parsed.variant = variantId;
              else if (matched_.variantId) parsed.variant = matched_.variantId;
              session.exercises[exIdx] = parsed;
              currentExNotes = exIdx;
              matched++;
            } else {
              unmatched++;
              unmatchedNames.push(exName);
              currentExNotes = null;
            }
          } else {
            unmatched++;
            unmatchedNames.push(exName);
            currentExNotes = null;
          }
        } else if (noteMatch && currentExNotes !== null) {
          if (session.exercises[currentExNotes]) {
            session.exercises[currentExNotes].notes = noteMatch[1];
          }
        }
      }

      if (Object.keys(session.exercises).length > 0) {
        sessions.push(session);
      }
    }

    return { sessions, matched, unmatched, unmatchedNames };
  }

  return { exportSession, exportAll, importMarkdown, formatDate, resolveDisplayName };
})();

// =====================================================
// TIMER MODULE — countdown + stopwatch
// =====================================================
const Timer = (function() {
  let audioCtx = null;
  const timers = {}; // keyed by element ID

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  // Start sound: short ascending tone — a "go!" cue
  function beepStart() {
    try {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.setValueAtTime(440, t);
      osc.frequency.linearRampToValueAtTime(880, t + 0.15);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.linearRampToValueAtTime(0, t + 0.2);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + 0.2);
    } catch (e) { /* audio not available */ }
  }

  // End sound: double beep — clear "done!" signal
  function beepEnd() {
    try {
      ensureAudio();
      const t = audioCtx.currentTime;
      // First beep
      const osc1 = audioCtx.createOscillator();
      const gain1 = audioCtx.createGain();
      osc1.frequency.value = 880;
      gain1.gain.setValueAtTime(0.3, t);
      gain1.gain.linearRampToValueAtTime(0, t + 0.15);
      osc1.connect(gain1);
      gain1.connect(audioCtx.destination);
      osc1.start(t);
      osc1.stop(t + 0.15);
      // Second beep (higher pitch, after short gap)
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.frequency.value = 1100;
      gain2.gain.setValueAtTime(0.3, t + 0.2);
      gain2.gain.linearRampToValueAtTime(0, t + 0.4);
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.start(t + 0.2);
      osc2.stop(t + 0.4);
    } catch (e) { /* audio not available */ }
  }

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate(200);
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // Countdown timer for duration/completion exercises
  function startCountdown(id, totalSeconds, onComplete) {
    ensureAudio();
    if (timers[id]) clearInterval(timers[id].interval);

    const el = document.getElementById(id);
    const btn = document.getElementById(id + '-btn');
    if (!el) return;

    let remaining = totalSeconds;
    el.textContent = formatTime(remaining);
    if (btn) { btn.textContent = 'PAUSE'; btn.className = 'timer-btn timer-btn-pause'; }
    beepStart();

    timers[id] = {
      remaining,
      paused: false,
      interval: setInterval(() => {
        if (timers[id].paused) return;
        timers[id].remaining--;
        el.textContent = formatTime(timers[id].remaining);
        if (timers[id].remaining <= 0) {
          clearInterval(timers[id].interval);
          delete timers[id];
          el.textContent = '0:00';
          if (btn) { btn.textContent = 'DONE'; btn.className = 'timer-btn timer-btn-done'; }
          beepEnd();
          vibrate();
          if (onComplete) onComplete();
        }
      }, 1000)
    };
  }

  function togglePause(id) {
    if (!timers[id]) return false;
    timers[id].paused = !timers[id].paused;
    const btn = document.getElementById(id + '-btn');
    if (btn) {
      btn.textContent = timers[id].paused ? 'RESUME' : 'PAUSE';
      btn.className = timers[id].paused ? 'timer-btn timer-btn-start' : 'timer-btn timer-btn-pause';
    }
    return true;
  }

  function isRunning(id) { return !!timers[id] && !timers[id].paused; }
  function isActive(id) { return !!timers[id]; }

  // Stopwatch for sled time tracking
  const stopwatches = {};

  function toggleStopwatch(id, timeInputId) {
    ensureAudio();
    const btn = document.getElementById(id);
    if (!btn) return;

    if (stopwatches[id]) {
      // Stop
      const elapsed = Math.round((Date.now() - stopwatches[id].start) / 1000);
      clearInterval(stopwatches[id].interval);
      delete stopwatches[id];
      btn.textContent = '⏱️';
      btn.classList.remove('running');
      beepEnd();
      // Fill the time input
      const timeInput = document.getElementById(timeInputId);
      if (timeInput) timeInput.value = formatTime(elapsed);
      // Trigger autosave
      timeInput?.dispatchEvent(new Event('input', { bubbles: true }));
    } else {
      // Start
      beepStart();
      const start = Date.now();
      btn.textContent = 'STOP';
      btn.classList.add('running');
      stopwatches[id] = {
        start,
        interval: setInterval(() => {
          const elapsed = Math.round((Date.now() - start) / 1000);
          btn.textContent = formatTime(elapsed);
        }, 1000)
      };
    }
  }

  // Hold timer for stretches — counts UP, beeps at goal, user stops manually
  const holdTimers = {};

  function startHoldTimer(id, goalSeconds) {
    ensureAudio();
    if (holdTimers[id]) return; // already running

    const el = document.getElementById(id);
    const goalEl = document.getElementById(id + '-goal');
    const btn = document.getElementById(id + '-btn');
    if (!el) return;

    const start = Date.now();
    let beeped = false;

    el.textContent = '0:00';
    if (btn) { btn.textContent = 'STOP'; btn.className = 'timer-btn timer-btn-pause'; }
    beepStart();

    holdTimers[id] = {
      start,
      goalSeconds,
      beeped,
      interval: setInterval(() => {
        const elapsed = Math.round((Date.now() - holdTimers[id].start) / 1000);
        el.textContent = formatTime(elapsed);
        if (elapsed >= goalSeconds && !holdTimers[id].beeped) {
          holdTimers[id].beeped = true;
          el.classList.add('timer-past-goal');
          const row = el.closest('.timer-row');
          if (row) row.classList.add('timer-goal-flash');
          beepEnd();
          vibrate();
        }
      }, 1000)
    };
  }

  function stopHoldTimer(id) {
    if (!holdTimers[id]) return 0;
    const elapsed = Math.round((Date.now() - holdTimers[id].start) / 1000);
    clearInterval(holdTimers[id].interval);
    delete holdTimers[id];

    const el = document.getElementById(id);
    const btn = document.getElementById(id + '-btn');
    if (el) el.textContent = formatTime(elapsed);
    if (btn) { btn.textContent = 'DONE'; btn.className = 'timer-btn timer-btn-done'; }
    return elapsed;
  }

  function getHoldElapsed(id) {
    if (!holdTimers[id]) return 0;
    return Math.round((Date.now() - holdTimers[id].start) / 1000);
  }

  function isHoldActive(id) { return !!holdTimers[id]; }

  function cleanup() {
    Object.values(timers).forEach(t => clearInterval(t.interval));
    Object.values(stopwatches).forEach(s => clearInterval(s.interval));
    // Auto-stop hold timers and save elapsed time before clearing
    Object.keys(holdTimers).forEach(id => {
      const elapsed = stopHoldTimer(id);
      // Write elapsed to hidden input if it exists
      const timeInput = document.getElementById(id.replace('timer-', 'time-'));
      if (timeInput && elapsed > 0) {
        timeInput.value = elapsed;
        // Also mark as done
        const side = id.replace('timer-', '');
        const doneInput = document.getElementById('done-' + side);
        if (doneInput) doneInput.value = 'true';
        const toggle = document.querySelector(`.completion-toggle[data-side="${side.toUpperCase()}"]`) || document.querySelector('.completion-toggle');
        if (toggle) { toggle.classList.add('done'); const cb = toggle.querySelector('.check-box'); if (cb) cb.textContent = '✅'; }
      }
    });
    Object.keys(timers).forEach(k => delete timers[k]);
    Object.keys(stopwatches).forEach(k => delete stopwatches[k]);
  }

  function formatDuration(ms) {
    const totalMin = Math.floor(ms / 60000);
    const h = Math.floor(totalMin / 60);
    const m = totalMin % 60;
    return h > 0 ? `${h}h ${m}min` : `${m}min`;
  }

  function formatTimeOfDay(isoString) {
    return new Date(isoString).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  }

  return { startCountdown, togglePause, isRunning, isActive, toggleStopwatch, startHoldTimer, stopHoldTimer, getHoldElapsed, isHoldActive, formatTime, formatDuration, formatTimeOfDay, cleanup, ensureAudio };
})();

// =====================================================
// VIEWS MODULE — DOM rendering
// =====================================================
const Views = (function() {
  const app = document.getElementById('app');

  function getNextWorkoutId() {
    const sessions = Data.getSessions();
    if (sessions.length === 0) return 1;
    const lastWorkoutId = sessions[sessions.length - 1].workoutId;
    return (lastWorkoutId % PROGRAMME.length) + 1;
  }

  function renderHome() {
    const wip = State.getWIP();
    let wipBanner = '';
    if (wip) {
      const w = PROGRAMME.find(p => p.id === wip.workoutId);
      wipBanner = `
        <div style="background:var(--amber-bg);border:1px solid var(--amber);border-radius:10px;padding:12px;margin-bottom:16px;">
          <div style="font-weight:600;color:var(--amber);">Session in progress</div>
          <div style="font-size:0.85rem;color:var(--text2);margin-top:4px;">W${wip.workoutId} — ${w ? w.name : ''} (${Markdown.formatDate(wip.date)})</div>
          <div style="display:flex;gap:8px;margin-top:8px;">
            <button class="btn btn-amber" style="flex:1;font-size:0.85rem;padding:10px;" onclick="Router.go('/w/${wip.workoutId}')">Resume</button>
            <button class="btn btn-secondary" style="flex:1;font-size:0.85rem;padding:10px;" onclick="State.abandonSession();Views.renderHome()">Discard</button>
          </div>
        </div>`;
    }

    // Check for unexported sessions
    const unexported = Data.getUnexportedSessions();
    let unexportedBanner = '';
    if (unexported.length > 0 && !wip) {
      unexportedBanner = `
        <div style="background:var(--red-bg);border:1px solid var(--red);border-radius:10px;padding:12px;margin-bottom:16px;">
          <div style="font-weight:600;color:var(--red);">${unexported.length} session${unexported.length > 1 ? 's' : ''} not exported</div>
          <div style="font-size:0.85rem;color:var(--text2);margin-top:4px;">Go to Session History to export.</div>
          <button class="btn btn-secondary" style="margin-top:8px;font-size:0.85rem;padding:10px;" onclick="Router.go('/settings')">Open Session History</button>
        </div>`;
    }

    const nextId = wip ? null : getNextWorkoutId();

    app.innerHTML = `
      <div class="content">
        <h1 style="font-size:1.5rem;margin-bottom:20px;">Exercise Tracker</h1>
        ${wipBanner}
        ${unexportedBanner}
        <div class="workout-grid">
          ${PROGRAMME.map(w => {
            const isNext = !wip && w.id === nextId;
            const allSessions = Data.getSessions();
            const lastSession = allSessions.filter(s => s.workoutId === w.id).pop();
            const lastDateStr = lastSession ? new Date(lastSession.date + 'T00:00:00').toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }) : '';
            return `
            <button class="workout-btn${isNext ? ' workout-next' : ''}" onclick="Router.go('/w/${w.id}')">
              <span class="workout-id">W${w.id}</span>
              <div class="workout-info">
                <span class="workout-name">${w.name}${isNext ? ' <span style="font-size:0.7rem;font-weight:700;color:#16a34a;vertical-align:middle;margin-left:4px;">NEXT</span>' : ''}</span>
                <span class="workout-sub">${lastDateStr}</span>
              </div>
            </button>`;
          }).join('')}
        </div>
        <div class="home-actions">
          <button class="btn btn-secondary" onclick="Router.go('/settings')">Settings & History</button>
        </div>
      </div>`;
  }

  function renderWorkout(workoutId) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) { renderHome(); return; }

    // Start or resume session
    const wip = State.getWIP();
    if (!wip || wip.workoutId !== workoutId) {
      if (wip) {
        if (!confirm(`You have an unfinished W${wip.workoutId} session. Discard it and start W${workoutId}?`)) {
          Router.go('/');
          return;
        }
        State.abandonSession();
      }
      State.startSession(workoutId);
    }

    // Build exercise rows grouped by supersets
    let rows = '';
    let exNum = 0;
    let i = 0;

    while (i < workout.exercises.length) {
      const ex = workout.exercises[i];

      if (ex.isFence) {
        rows += `<div class="malto-fence">🥤 MALTO FENCE — ${ex.fenceNote}</div>`;
        i++;
        continue;
      }

      exNum++;

      // Check if this is a superset
      if (ex.flow === 'SS' && ex.supersetWith) {
        // Find partner
        const partnerIdx = workout.exercises.findIndex((e, j) => j > i && e.id === ex.supersetWith);
        if (partnerIdx >= 0) {
          const partner = workout.exercises[partnerIdx];
          const exNum2 = exNum + 1;
          rows += `
            <div class="ss-group">
              <div class="ss-label">Superset</div>
              ${renderExRow(ex, i, exNum, workoutId)}
              ${renderExRow(partner, partnerIdx, exNum2, workoutId)}
            </div>`;
          exNum++;
          i = partnerIdx + 1;
          continue;
        }
      }

      rows += renderExRow(ex, i, exNum, workoutId);
      i++;
    }

    const wipData = State.getWIP();

    const startedAt = wipData?.startedAt;
    const completedAt = wipData?.completedAt;
    const startTimeStr = startedAt ? Timer.formatTimeOfDay(startedAt) : '';
    const timerRunning = startedAt && !completedAt;

    let clockHtml = '';
    if (completedAt) {
      const dur = Timer.formatDuration(new Date(completedAt) - new Date(startedAt));
      clockHtml = `<div id="session-clock" style="font-size:0.8rem;color:var(--text2);margin-top:2px;">${startTimeStr} → ${Timer.formatTimeOfDay(completedAt)} (${dur}) ✓</div>`;
    } else if (startedAt) {
      clockHtml = `<div id="session-clock" style="font-size:0.8rem;color:var(--text2);margin-top:2px;">Started ${startTimeStr} · 0:00</div>`;
    } else {
      clockHtml = `<button class="btn btn-success" style="margin-top:6px;padding:10px 24px;font-size:1rem;" onclick="State.startTimer();Views.renderWorkout(${workoutId});">▶ Start Session</button>`;
    }

    const endSessionBtn = timerRunning
      ? `<div style="margin:16px 0;"><button class="btn" style="width:100%;padding:14px;font-size:1rem;background:var(--red);color:#fff;border:none;border-radius:8px;" onclick="State.endTimer();Views.renderWorkout(${workoutId});">⏹ End Session</button></div>`
      : '';

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Router.go('/')">← Home</button>
        <h1>W${workoutId} — ${workout.name}</h1>
        ${clockHtml}
      </div>
      <div class="content">
        <div class="exercise-list">${rows}</div>
        ${endSessionBtn}
        <div class="workout-notes">
          <label>How did it feel overall?</label>
          <textarea class="notes-field" id="overall-notes" placeholder="Speak or type..."
            oninput="Views._syncSessionNotes()"
          >${wipData?.overall || ''}</textarea>
          <label>Injuries / concerns</label>
          <textarea class="notes-field" id="injury-notes" placeholder="Any pain, tweaks, flags..."
            oninput="Views._syncSessionNotes()"
          >${wipData?.injuries || ''}</textarea>
          <label>Gym</label>
          <div style="display:flex;gap:8px;">
            <select class="notes-field" id="gym-select" style="min-height:48px;padding:10px;flex:1;"
              onchange="if(this.value==='__add_new__'){Views._addNewGym();}else{Views._syncSessionNotes();}">
              ${Data.getGymList().map(g => `<option value="${g}" ${g === (wipData?.gym || Data.getLastGym()) ? 'selected' : ''}>${g}</option>`).join('')}
              <option value="__add_new__">+ Add new gym…</option>
            </select>
          </div>
        </div>
        <div style="margin-top:16px;padding-bottom:20px;">
          <button class="btn btn-success" onclick="Views.finishWorkout(${workoutId})">Finish & Copy Session</button>
        </div>
      </div>`;

    // Start session clock (only tick if timer is still running)
    if (timerRunning) {
      const startMs = new Date(startedAt).getTime();
      function updateClock() {
        const el = document.getElementById('session-clock');
        if (!el) return;
        const elapsed = Date.now() - startMs;
        const totalSec = Math.floor(elapsed / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        const elapsedStr = h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : `${m}:${String(s).padStart(2,'0')}`;
        el.textContent = `Started ${startTimeStr} · ${elapsedStr}`;
      }
      updateClock();
      window._sessionClockInterval = setInterval(updateClock, 1000);
    }
  }

  function renderExRow(ex, index, num, workoutId) {
    const completion = State.getExerciseCompletionStatus(index, ex.sets);
    const statusIcon = completion.status === 'complete' ? '✅'
      : completion.status === 'partial' ? `<span class="partial-status">${completion.filled}/${completion.total}</span>`
      : '';
    const lastEntry = State.getLastEntry(ex.id);
    const trackingType = getEffectiveTrackingType(ex);

    let metaStr = '';
    if (trackingType === 'duration' || trackingType === 'completion' || trackingType === 'multi_timer') {
      metaStr = ex.reps;
    } else if (trackingType === 'sled') {
      metaStr = 'Sled';
    } else if (trackingType === 'weight_distance') {
      metaStr = `${ex.sets}×${ex.reps}`;
    } else {
      metaStr = `${ex.sets}×${ex.reps}`;
    }

    let lastStr = '';
    if (lastEntry) {
      if (lastEntry.sets?.[0]?.weight) lastStr = `Last: ${lastEntry.sets[0].weight}kg`;
      else if (lastEntry.sets?.[0]?.weightL) lastStr = `Last: L${lastEntry.sets[0].weightL}/R${lastEntry.sets[0].weightR}kg`;
      else if (lastEntry.weight) lastStr = `Last: ${lastEntry.weight}kg`;
    }

    return `
      <div class="ex-row" onclick="Router.go('/w/${workoutId}/e/${index}')">
        <span class="ex-num">${num}</span>
        <div class="ex-info">
          <span class="ex-name">${ex.name}${ex.isNew ? ' <span class="badge badge-new">NEW</span>' : ''}${ex.id === 'cable-chop' ? ` <span style="font-size:0.75rem;font-weight:400;">${Data.getChopDirection() === 'hi_lo' ? '🔄Hi→Lo' : '🔄Lo→Hi'}</span>` : ''}</span>
          <span class="ex-meta">${metaStr}${ex.flow === 'SS' ? ' <span class="badge badge-ss">SS</span>' : ''}${lastStr ? ' · ' + lastStr : ''}</span>
        </div>
        <span class="ex-status">${statusIcon}</span>
      </div>`;
  }

  // ---- Variant helpers ----
  function getActiveVariant(ex) {
    if (!ex.variants) return null;
    const savedId = Data.getVariant(ex.id);
    if (savedId) {
      const found = ex.variants.find(v => v.id === savedId);
      if (found) return found;
    }
    return ex.variants.find(v => v.isDefault) || ex.variants[0];
  }

  function getEffectiveTrackingType(ex) {
    const variant = getActiveVariant(ex);
    return variant?.trackingType || ex.trackingType || 'weight_reps';
  }

  function getEffectiveExercise(ex) {
    const variant = getActiveVariant(ex);
    if (!variant) return ex;
    return {
      ...ex,
      trackingType: variant.trackingType || ex.trackingType,
      sets: variant.sets !== undefined ? variant.sets : ex.sets,
      reps: variant.reps !== undefined ? variant.reps : ex.reps,
      repRange: variant.repRange || ex.repRange,
      progressionType: variant.progressionType || ex.progressionType,
    };
  }

  function getStructuredCues(ex) {
    const cueData = FORM_CUES[ex.id];
    if (!cueData) return null;
    // Variant-keyed: check if it has setup/exec directly or variant sub-objects
    if (cueData.setup) return cueData;
    // Variant-keyed: resolve to active variant
    const variant = getActiveVariant(ex);
    if (variant && cueData[variant.id]) return cueData[variant.id];
    // Fallback: first key that has setup
    for (const k of Object.keys(cueData)) {
      if (cueData[k]?.setup) return cueData[k];
    }
    return null;
  }

  function renderStructuredCues(cues) {
    let html = '';
    if (cues.setup?.length) {
      html += `<div class="cue-label">Setup</div><ul class="cue-list">${cues.setup.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.exec?.length) {
      html += `<div class="cue-label">Do</div><ul class="cue-list">${cues.exec.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.mistakes?.length) {
      html += `<div class="cue-label">Don't</div><ul class="cue-list mistakes">${cues.mistakes.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    if (cues.you?.length) {
      html += `<div class="cue-label">You</div><ul class="cue-list you">${cues.you.map(s => `<li>${s}</li>`).join('')}</ul>`;
    }
    return html;
  }

  // ---- Last session display ----
  function formatLastEntry(lastEntry, ex) {
    if (!lastEntry) return '';
    let detail = '';
    if (lastEntry.done || lastEntry.doneL !== undefined) {
      detail = lastEntry.doneL !== undefined ? `L: ${lastEntry.doneL ? '✅' : '—'} R: ${lastEntry.doneR ? '✅' : '—'}` : (lastEntry.done ? '✅' : '—');
    } else if (lastEntry.sets && lastEntry.sets.length > 0) {
      const s0 = lastEntry.sets[0];
      if (s0.weightL !== undefined) {
        detail = lastEntry.sets.map(s => `L:${s.weightL||0}×${s.repsL||0} R:${s.weightR||0}×${s.repsR||0}`).join(', ');
      } else if (s0.repsL !== undefined) {
        if (s0.weight !== undefined) {
          detail = lastEntry.sets.map(s => `${s.weight||0}kg L${s.repsL}/R${s.repsR}`).join(', ');
        } else {
          detail = `${lastEntry.weight||0}kg — ` + lastEntry.sets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
        }
      } else if (s0.lengths !== undefined) {
        detail = lastEntry.sets.map(s => `${s.weight||0}kg × ${s.lengths}L ${Timer.formatTime(s.timeSeconds||0)}`).join(', ');
      } else if (s0.distance !== undefined) {
        detail = lastEntry.sets.map(s => `${s.weight||0}kg/h × ${s.distance}m`).join(', ');
      } else {
        detail = lastEntry.sets.map(s => `${s.weight || 'BW'}kg × ${s.reps}`).join(', ');
      }
    }
    return `
      <div class="last-session">
        <div class="last-session-title">Last session (${Markdown.formatDate(lastEntry.date)}, W${lastEntry.workoutId})</div>
        <div>${detail}</div>
        ${lastEntry.notes ? `<div style="margin-top:4px;font-style:italic;color:var(--text3);">${lastEntry.notes}</div>` : ''}
      </div>`;
  }

  // ---- Type-specific renderers ----

  function renderWeightRepsSets(ex, existingData, preFill) {
    const wLabel = ex.weightLabel || 'kg';
    const rLabel = ex.repsLabel || 'reps';
    let html = `<div class="sets-header"><span></span><span>${wLabel}</span><span></span><span>${rLabel}</span></div>`;
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const weight = existing?.weight ?? (preFill.weight || 0);
      const reps = existing?.reps ?? (ex.prefillReps || '');
      html += `
        <div class="set-row">
          <span class="set-label">Set ${s + 1}</span>
          <input type="number" class="set-input weight-input" inputmode="decimal" step="0.5" placeholder="${wLabel}" value="${weight}" data-set="${s}">
          <span class="set-x">×</span>
          <input type="number" class="set-input reps-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${reps}" data-set="${s}">
        </div>
        ${s === 0 && preFill.bumped && !existingData ? `<div class="bump-note">Auto-bumped from ${preFill.from}kg</div>` : ''}`;
    }
    return html;
  }

  function renderRepsOnlySets(ex, existingData, preFill) {
    const rLabel = ex.repsLabel || 'reps';
    let html = `<div class="sets-header" style="grid-template-columns:50px 1fr;"><span></span><span>${rLabel}</span></div>`;
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const reps = existing?.reps ?? (ex.prefillReps || '');
      html += `
        <div class="set-row" style="grid-template-columns:50px 1fr;">
          <span class="set-label">Set ${s + 1}</span>
          <input type="number" class="set-input reps-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${reps}" data-set="${s}">
        </div>`;
    }
    return html;
  }

  function renderRepsOnlySplitSets(ex, existingData) {
    const rLabel = ex.repsLabel || 'reps';
    let html = `<div class="split-reps-header" style="grid-template-columns:50px 30px 1fr 30px 1fr;"><span></span><span></span><span>L ${rLabel}</span><span></span><span>R ${rLabel}</span></div>`;
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const rL = existing?.repsL ?? (ex.prefillReps || '');
      const rR = existing?.repsR ?? (ex.prefillReps || '');
      html += `
        <div class="split-reps-row" style="grid-template-columns:50px 30px 1fr 30px 1fr;">
          <span class="set-label">Set ${s + 1}</span>
          <span class="uni-side-label">L</span>
          <input type="number" class="set-input rl-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rL}" data-set="${s}">
          <span class="uni-side-label">R</span>
          <input type="number" class="set-input rr-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rR}" data-set="${s}">
        </div>`;
    }
    return html;
  }

  function renderSplitWeightSets(ex, existingData, preFill) {
    const wLabel = ex.weightLabel || 'kg';
    const rLabel = ex.repsLabel || 'reps';
    let html = '';
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const wL = existing?.weightL ?? (preFill.weightL || 0);
      const rL = existing?.repsL ?? (ex.prefillReps || '');
      const wR = existing?.weightR ?? (preFill.weightR || 0);
      const rR = existing?.repsR ?? (ex.prefillReps || '');
      html += `
        <div class="uni-set-group">
          <div class="uni-set-label">Set ${s + 1}</div>
          <div class="uni-side-row">
            <span class="uni-side-label">L</span>
            <input type="number" class="set-input wl-input" inputmode="decimal" step="0.5" placeholder="${wLabel}" value="${wL}" data-set="${s}">
            <span class="set-x">×</span>
            <input type="number" class="set-input rl-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rL}" data-set="${s}">
          </div>
          <div class="uni-side-row">
            <span class="uni-side-label">R</span>
            <input type="number" class="set-input wr-input" inputmode="decimal" step="0.5" placeholder="${wLabel}" value="${wR}" data-set="${s}">
            <span class="set-x">×</span>
            <input type="number" class="set-input rr-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rR}" data-set="${s}">
          </div>
        </div>`;
    }
    return html;
  }

  function renderSplitRepsSets(ex, existingData, preFill) {
    const wLabel = ex.weightLabel || 'kg';
    const rLabel = ex.repsLabel || 'reps';
    // Backward compat: old data has existingData.weight as shared value
    const fallbackWeight = existingData?.weight ?? (preFill.weight || 0);
    let html = `<div class="split-reps-header"><span></span><span>${wLabel}</span><span></span><span>L ${rLabel}</span><span></span><span>R ${rLabel}</span></div>`;
    for (let s = 0; s < ex.sets; s++) {
      const existing = existingData?.sets?.[s];
      const weight = existing?.weight ?? fallbackWeight;
      const rL = existing?.repsL ?? (ex.prefillReps || '');
      const rR = existing?.repsR ?? (ex.prefillReps || '');
      html += `
        <div class="split-reps-row">
          <span class="set-label">Set ${s + 1}</span>
          <input type="number" class="set-input sr-weight-input" inputmode="decimal" step="0.5" placeholder="${wLabel}" value="${weight}" data-set="${s}">
          <span class="uni-side-label">L</span>
          <input type="number" class="set-input rl-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rL}" data-set="${s}">
          <span class="uni-side-label">R</span>
          <input type="number" class="set-input rr-input" inputmode="numeric" step="1" placeholder="${rLabel}" value="${rR}" data-set="${s}">
        </div>
        ${s === 0 && preFill.bumped && !existingData ? `<div class="bump-note">Auto-bumped from ${preFill.from}kg</div>` : ''}`;
    }
    return html;
  }

  function renderDurationExercise(ex, existingData) {
    const seconds = ex.timerSeconds || 60;
    if (ex.unilateral) {
      const doneL = existingData?.doneL || false;
      const doneR = existingData?.doneR || false;
      const timeL = existingData?.timeL || 0;
      const timeR = existingData?.timeR || 0;
      return `
        <div class="timer-block">
          <div class="timer-row">
            <span class="timer-side">LEFT</span>
            <span class="timer-display${timeL >= seconds ? ' timer-past-goal' : ''}" id="timer-l" ${doneL ? `onclick="Views.setTimeManual('timer-l')" style="cursor:pointer;"` : ''}>${doneL && timeL ? Timer.formatTime(timeL) : '0:00'}</span>
            <span class="timer-goal">/ ${Timer.formatTime(seconds)}</span>
            <button class="timer-btn ${doneL ? 'timer-btn-done' : 'timer-btn-start'}" id="timer-l-btn"
              onclick="if(Timer.isHoldActive('timer-l')){const t=Timer.stopHoldTimer('timer-l');document.getElementById('time-l').value=t;document.getElementById('done-l').value='true';document.getElementById('time-adjust-l').style.display='flex';Views._triggerAutoSave();}else if(document.getElementById('done-l').value!=='true'){Timer.startHoldTimer('timer-l',${seconds});}">
              ${doneL ? 'DONE' : 'START'}
            </button>
          </div>
          <div class="timer-row">
            <span class="timer-side">RIGHT</span>
            <span class="timer-display${timeR >= seconds ? ' timer-past-goal' : ''}" id="timer-r" ${doneR ? `onclick="Views.setTimeManual('timer-r')" style="cursor:pointer;"` : ''}>${doneR && timeR ? Timer.formatTime(timeR) : '0:00'}</span>
            <span class="timer-goal">/ ${Timer.formatTime(seconds)}</span>
            <button class="timer-btn ${doneR ? 'timer-btn-done' : 'timer-btn-start'}" id="timer-r-btn"
              onclick="if(Timer.isHoldActive('timer-r')){const t=Timer.stopHoldTimer('timer-r');document.getElementById('time-r').value=t;document.getElementById('done-r').value='true';document.getElementById('time-adjust-r').style.display='flex';Views._triggerAutoSave();}else if(document.getElementById('done-r').value!=='true'){Timer.startHoldTimer('timer-r',${seconds});}">
              ${doneR ? 'DONE' : 'START'}
            </button>
          </div>
          <input type="hidden" id="done-l" value="${doneL}">
          <input type="hidden" id="done-r" value="${doneR}">
          <input type="hidden" id="time-l" value="${timeL}">
          <input type="hidden" id="time-r" value="${timeR}">
          <div class="time-adjust" id="time-adjust-l" style="${doneL ? '' : 'display:none'}">
            <span style="font-size:0.75rem;color:var(--text3);font-weight:600;">L</span>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-l',-30)">−30s</button>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-l',30)">+30s</button>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-l',60)">+1min</button>
          </div>
          <div class="time-adjust" id="time-adjust-r" style="${doneR ? '' : 'display:none'}">
            <span style="font-size:0.75rem;color:var(--text3);font-weight:600;">R</span>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-r',-30)">−30s</button>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-r',30)">+30s</button>
            <button class="time-adjust-btn" onclick="Views.adjustTime('timer-r',60)">+1min</button>
          </div>
        </div>`;
    }
    const done = existingData?.done || false;
    const time = existingData?.time || 0;
    return `
      <div class="timer-block">
        <div class="timer-row">
          <span class="timer-display${time >= seconds ? ' timer-past-goal' : ''}" id="timer-main" ${done ? `onclick="Views.setTimeManual('timer-main')" style="cursor:pointer;"` : ''}>${done && time ? Timer.formatTime(time) : '0:00'}</span>

  function renderMultiTimerExercise(ex, existingData) {
    const seq = ex.timerSequence || [];
    const steps = existingData?.timerSteps || [];
    const currentStep = steps.filter(s => s.done).length;
    const allDone = currentStep >= seq.length;

    let html = '<div class="multi-timer-block">';
    for (let i = 0; i < seq.length; i++) {
      const step = seq[i];
      const stepData = steps[i] || {};
      const isDone = !!stepData.done;
      const isCurrent = i === currentStep && !allDone;
      const timeVal = stepData.time || 0;
      const cls = isDone ? 'done' : isCurrent ? 'active' : '';

      let btnHtml = '';
      if (isDone) {
        btnHtml = `<span class="multi-timer-display">${Timer.formatTime(timeVal)}</span>
          <button class="multi-timer-btn multi-timer-btn-done" disabled>✅</button>`;
      } else if (isCurrent) {
        btnHtml = `<span class="multi-timer-display" id="mt-display-${i}">0:00</span>
          <button class="multi-timer-btn multi-timer-btn-start" id="mt-btn-${i}"
            onclick="Views._multiTimerAction(${i}, ${step.seconds})">START</button>`;
      } else {
        btnHtml = `<span class="multi-timer-display" style="color:var(--text3);">0:00</span>
          <button class="multi-timer-btn multi-timer-btn-waiting" disabled>—</button>`;
      }

      html += `
        <div class="multi-timer-step ${cls}" id="mt-step-${i}">
          <span class="multi-timer-step-num">${i + 1}</span>
          <div class="multi-timer-step-info">
            <div class="multi-timer-step-label">${step.label}</div>
            <div class="multi-timer-step-time">${Timer.formatTime(step.seconds)}</div>
          </div>
          ${btnHtml}
        </div>`;
    }
    // Hidden inputs to track state
    html += `<input type="hidden" id="mt-steps-data" value='${JSON.stringify(steps)}'>`;
    html += '</div>';
    return html;
  }

  // Multi-timer action handler: start/pause/stop for current step
  function _multiTimerAction(stepIndex, goalSeconds) {
    const timerId = `mt-timer-${stepIndex}`;
    const displayId = `mt-display-${stepIndex}`;
    const btnId = `mt-btn-${stepIndex}`;
    const btn = document.getElementById(btnId);
    if (!btn) return;

    if (Timer.isHoldActive(timerId)) {
      // Stop the timer
      const elapsed = Timer.stopHoldTimer(timerId);
      const display = document.getElementById(displayId);
      if (display) display.textContent = Timer.formatTime(elapsed);
      btn.textContent = '✅';
      btn.className = 'multi-timer-btn multi-timer-btn-done';
      btn.disabled = true;

      // Mark step done in hidden data
      const dataInput = document.getElementById('mt-steps-data');
      let stepsData = [];
      try { stepsData = JSON.parse(dataInput.value); } catch {}
      while (stepsData.length <= stepIndex) stepsData.push({});
      stepsData[stepIndex] = { done: true, time: elapsed };
      dataInput.value = JSON.stringify(stepsData);

      // Update step styling
      const stepEl = document.getElementById(`mt-step-${stepIndex}`);
      if (stepEl) { stepEl.classList.remove('active'); stepEl.classList.add('done'); }

      _triggerAutoSave();

      // Auto-advance: activate next step
      const ex = PROGRAMME.find(w => w.id === _currentRenderCtx.workoutId)?.exercises[_currentRenderCtx.exIndex];
      if (ex?.timerSequence && stepIndex + 1 < ex.timerSequence.length) {
        const next = stepIndex + 1;
        const nextStep = ex.timerSequence[next];
        const nextStepEl = document.getElementById(`mt-step-${next}`);
        if (nextStepEl) nextStepEl.classList.add('active');
        // Replace waiting button with active start button
        const nextDisplay = nextStepEl?.querySelector('.multi-timer-display');
        if (nextDisplay) { nextDisplay.id = `mt-display-${next}`; nextDisplay.style.color = ''; }
        const nextBtnSlot = nextStepEl?.querySelector('.multi-timer-btn');
        if (nextBtnSlot) {
          const newBtn = document.createElement('button');
          newBtn.className = 'multi-timer-btn multi-timer-btn-start';
          newBtn.id = `mt-btn-${next}`;
          newBtn.textContent = 'START';
          newBtn.onclick = () => Views._multiTimerAction(next, nextStep.seconds);
          nextBtnSlot.replaceWith(newBtn);
        }
        // Auto-start next timer after brief delay
        setTimeout(() => Views._multiTimerAction(next, nextStep.seconds), 400);
      }
    } else {
      // Start the hold timer
      Timer.startHoldTimer(timerId, goalSeconds);
      btn.textContent = 'STOP';
      btn.className = 'multi-timer-btn multi-timer-btn-pause';
      // Update display from hold timer
      const display = document.getElementById(displayId);
      if (display) {
        const updateInterval = setInterval(() => {
          if (!Timer.isHoldActive(timerId)) { clearInterval(updateInterval); return; }
          display.textContent = Timer.formatTime(Timer.getHoldElapsed(timerId));
        }, 200);
      }
    }
  }

  function renderSledSets(ex, existingData, lastEntry) {
    const sledLength = Data.getSledLength();

    for (let s = 0; s < numSets; s++) {
      const existing = existingData?.sets?.[s];
      const lastSet = lastEntry?.sets?.[s];
      const weight = existing?.weight ?? (lastSet?.weight ?? '');

      html += `
        <div class="sled-set-row">
          <span class="set-label">Set ${s + 1}</span>
          <input type="number" class="set-input sled-weight" inputmode="decimal" step="0.5" placeholder="kg" value="${weight}" data-set="${s}">
          <input type="number" class="set-input sled-lengths" inputmode="numeric" step="1" placeholder="len" value="${lengths}" data-set="${s}"
            oninput="Views._updateSledDerived();">
