  // ---- Peek view: upcoming exercises ----
  function renderPeekView(workout, currentExIndex) {
    const remaining = [];
    let exNum = 0;
    for (let i = 0; i < workout.exercises.length; i++) {
      const ex = workout.exercises[i];
      if (ex.isFence) {
        if (i > currentExIndex) remaining.push({ isFence: true, note: ex.fenceNote });
        continue;
      }
      exNum++;
      if (i <= currentExIndex) continue;
      const effEx = getEffectiveExercise(ex);
      const tt = getEffectiveTrackingType(ex);
      let meta = '';
      if (tt === 'duration' || tt === 'completion' || tt === 'multi_timer') meta = ex.reps;
      else if (tt === 'sled') meta = 'Sled';
      else meta = `${effEx.sets}×${effEx.reps}`;
      const completion = State.getExerciseCompletionStatus(i, ex.sets);
      const done = completion.status === 'complete' ? ' ✅' : '';
      remaining.push({ index: i, num: exNum, name: ex.name, meta, flow: ex.flow, done });
    }
    if (remaining.length === 0) return '';
    const rows = remaining.map(r => {
      if (r.isFence) return `<div class="peek-fence">🥤 ${r.note}</div>`;
      return `<div class="peek-row" onclick="Views.saveAndBack(${workout.id}, ${currentExIndex});setTimeout(()=>Router.go('/w/${workout.id}/e/${r.index}'),50)">
        <span class="peek-num">${r.num}</span>
        <span class="peek-name">${r.name}${r.done}</span>
        <span class="peek-meta">${r.meta}${r.flow === 'SS' ? ' <span class="badge badge-ss" style="font-size:0.6rem;">SS</span>' : ''}</span>
      </div>`;
    }).join('');
    return `
      <div class="peek-section collapsed" id="peek-section">
        <button class="peek-toggle" onclick="document.getElementById('peek-section').classList.toggle('collapsed')">Up next (${remaining.filter(r => !r.isFence).length} remaining)</button>
        <div class="peek-body">${rows}</div>
      </div>`;
  }

  // ---- Main exercise detail view ----
  function renderExercise(workoutId, exIndex) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) { renderHome(); return; }
    const ex = workout.exercises[exIndex];
    if (!ex || ex.isFence) { renderWorkout(workoutId); return; }

    Timer.cleanup();
    _currentRenderCtx = { workoutId, exIndex };

    const totalEx = workout.exercises.filter(e => !e.isFence).length;
    const exNum = workout.exercises.slice(0, exIndex + 1).filter(e => !e.isFence).length;
    const effEx = getEffectiveExercise(ex);
    const trackingType = getEffectiveTrackingType(ex);
    const lastEntry = State.getLastEntry(ex.id);
    const existingData = State.getExerciseData(exIndex);
    const preFill = Progression.getPreFill(ex.id, effEx);

    // Form cues — user-edited (localStorage) > structured (FORM_CUES) > plain text fallback
    let cuesHtml = '';
    const userCues = Data.getUserCues(ex.id);
    const structuredCues = getStructuredCues(ex);
    const hasAnyCues = userCues || structuredCues || ex.formCues || ex.notes;

    // Last session notes from history (not from current session)
    const historyForNotes = State.getExerciseHistory(ex.id);
    const lastHistoryNotes = historyForNotes.length > 0 && historyForNotes[0].data.notes ? historyForNotes[0] : null;

    if (hasAnyCues || lastHistoryNotes) {
      let cueContent = '';
      if (userCues) {
        cueContent = `<div style="margin-bottom:6px;white-space:pre-wrap;">${userCues}</div>`;
      } else if (structuredCues) {
        cueContent = renderStructuredCues(structuredCues);
      } else if (ex.formCues) {
        cueContent = `<div style="margin-bottom:6px;">${ex.formCues}</div>`;
      }

      const lastNotesHtml = lastHistoryNotes
        ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
            <div style="font-size:0.75rem;font-weight:600;color:var(--text3);margin-bottom:4px;">Last session notes (${Markdown.formatDate(lastHistoryNotes.date)})</div>
            <div style="font-size:0.8rem;color:var(--text3);font-style:italic;white-space:pre-wrap;">${lastHistoryNotes.data.notes}</div>
          </div>`
        : '';

      cuesHtml = `
        <div class="cue-section collapsed" id="cue-section">
          <button class="cue-toggle" onclick="document.getElementById('cue-section').classList.toggle('collapsed')">Reference & Cues</button>
          <div class="cue-body">
            ${cueContent}
            ${ex.notes && !userCues ? `<div style="color:var(--text3);font-style:italic;margin-top:6px;">${ex.notes}</div>` : ''}
            ${lastNotesHtml}
            <a class="history-link" onclick="Router.go('/exercise/${ex.id}')">View full history →</a>
          </div>
        </div>`;
    }

    // Superset info
    let ssInfo = '';
    if (ex.flow === 'SS' && ex.supersetWith) {
      const partner = workout.exercises.find(e => e.id === ex.supersetWith);
      if (partner) ssInfo = `<div style="font-size:0.85rem;color:var(--ss-color);margin-bottom:8px;"><span class="badge badge-ss">SS</span> with ${partner.name}</div>`;
    }

    // Variant pills
    const variantHtml = renderVariantPills(ex);

    // Chop direction (cable-chop only)
    let chopHtml = '';
    if (ex.id === 'cable-chop') {
      const dir = Data.getChopDirection();
      const label = dir === 'hi_lo' ? '🔄 Hi→Lo' : '🔄 Lo→Hi';
      const session = dir === 'hi_lo' ? 'Session A' : 'Session B';
      chopHtml = `<div class="chop-direction" onclick="Views.toggleChopDirection()">${label} <span style="font-weight:400;font-size:0.8rem;color:var(--text3);">(${session})</span></div>`;
    }

    // Type-specific inputs (use effEx for set counts and rep ranges)
    let inputsHtml = '';
    switch (trackingType) {
      case 'duration':
        inputsHtml = renderDurationExercise(effEx, existingData); break;
      case 'completion':
        inputsHtml = renderCompletionExercise(effEx, existingData); break;
      case 'multi_timer':
        inputsHtml = renderMultiTimerExercise(effEx, existingData); break;
      case 'sled':
        inputsHtml = renderSledSets(effEx, existingData, lastEntry); break;
      case 'weight_distance':
        inputsHtml = renderWeightDistanceSets(effEx, existingData, preFill); break;
      case 'reps_only':
        if (effEx.unilateral === 'split_reps') inputsHtml = renderRepsOnlySplitSets(effEx, existingData);
        else inputsHtml = renderRepsOnlySets(effEx, existingData, preFill);
        break;
      case 'weight_reps': default:
        if (effEx.unilateral === 'split_weight') inputsHtml = renderSplitWeightSets(effEx, existingData, preFill);
        else if (effEx.unilateral === 'split_reps') inputsHtml = renderSplitRepsSets(effEx, existingData, preFill);
        else inputsHtml = renderWeightRepsSets(effEx, existingData, preFill);
        break;
    }

    const existingNotes = existingData?.notes || '';

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Views.saveAndBack(${workoutId}, ${exIndex})">← Back</button>
        <h1>W${workoutId} — ${exNum} out of ${totalEx}</h1>
      </div>
      <div class="content ex-detail">
        <div class="ex-title">${ex.name}${ex.isNew ? ' <span class="badge badge-new">NEW</span>' : ''}</div>
        <div class="ex-target">${effEx.sets} × ${effEx.reps}${effEx.repRange ? ` (range: ${effEx.repRange[0]}-${effEx.repRange[1]})` : ''}</div>
        ${ssInfo}
        ${variantHtml}
        ${chopHtml}
        ${cuesHtml}
        ${formatLastEntry(lastEntry, ex)}
        ${inputsHtml}
        <textarea class="notes-field" id="ex-notes" placeholder="Speak or type notes..."
          oninput="Views._triggerAutoSave()">${existingNotes}</textarea>
        <div id="progression-banner"></div>
        ${renderPeekView(workout, exIndex)}
      </div>
      <div class="save-bar">
        <span class="auto-saved" id="auto-save-status">Auto-saved</span>
        <button class="done-btn" onclick="Views.saveAndBack(${workoutId}, ${exIndex})">Done ←</button>
      </div>`;

    // Add listeners for all inputs
    document.querySelectorAll('.weight-input, .reps-input, .wl-input, .wr-input, .rl-input, .rr-input, .sr-weight-input, .sled-weight, .sled-lengths, .sled-time, .wd-weight, .wd-distance').forEach(input => {
      input.addEventListener('input', () => {
        Views._triggerAutoSave();
        Views.updateBanner(ex);
      });
      // Select all on focus so tapping a pre-filled "0" lets you type immediately
      input.addEventListener('focus', () => input.select());
    });

    if (existingData) Views.updateBanner(ex);
  }

  // Adjust recorded time for a completed hold timer
  function adjustTime(timerId, delta) {
    const timeInput = document.getElementById(timerId.replace('timer-', 'time-'));
    if (!timeInput) return;
    const current = parseInt(timeInput.value) || 0;
    const newTime = Math.max(0, current + delta);
    timeInput.value = newTime;
    const display = document.getElementById(timerId);
    if (display) display.textContent = Timer.formatTime(newTime);
    _triggerAutoSave();
  }

  function setTimeManual(timerId) {
    const timeInput = document.getElementById(timerId.replace('timer-', 'time-'));
    if (!timeInput) return;
    const current = parseInt(timeInput.value) || 0;
    const input = prompt('Enter time in seconds:', current);
    if (input === null) return;
    const val = parseInt(input);
    if (isNaN(val) || val < 0) return;
    timeInput.value = val;
    const display = document.getElementById(timerId);
    if (display) display.textContent = Timer.formatTime(val);
    _triggerAutoSave();
  }

  // Trigger auto-save using stored context
  function _triggerAutoSave() {
    if (_currentRenderCtx) autoSaveExercise(_currentRenderCtx.workoutId, _currentRenderCtx.exIndex);
    const el = document.getElementById('auto-save-status');
    if (el) { el.textContent = 'Saved ✓'; clearTimeout(el._t); el._t = setTimeout(() => el.textContent = 'Auto-saved', 1500); }
  }

  function _updateSledDerived() {
    const sledLength = Data.getSledLength();
    document.querySelectorAll('.sled-lengths').forEach(input => {
      const s = input.dataset.set;
      const lengths = parseFloat(input.value) || 0;
      const el = document.getElementById(`sled-derived-${s}`);
      if (el) el.textContent = lengths && sledLength ? `= ${Math.round(lengths * sledLength)}m` : '';
    });
    _triggerAutoSave();
  }

  // ---- Auto-save: collect data from DOM based on tracking type ----
  function autoSaveExercise(workoutId, exIndex) {
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) return;
    const ex = workout.exercises[exIndex];
    if (!ex) return;
    const effEx = getEffectiveExercise(ex);
    const trackingType = getEffectiveTrackingType(ex);
    const notes = document.getElementById('ex-notes')?.value || '';
    const variant = getActiveVariant(ex);
    const data = { notes };
    if (variant) data.variant = variant.id;

    switch (trackingType) {
      case 'duration': {
        if (effEx.unilateral) {
          data.doneL = document.getElementById('done-l')?.value === 'true';
          data.doneR = document.getElementById('done-r')?.value === 'true';
          const tL = parseInt(document.getElementById('time-l')?.value) || 0;
          const tR = parseInt(document.getElementById('time-r')?.value) || 0;
          if (tL) data.timeL = tL;
          if (tR) data.timeR = tR;
        } else {
          data.done = document.getElementById('done-main')?.value === 'true';
          const t = parseInt(document.getElementById('time-main')?.value) || 0;
          if (t) data.time = t;
        }
        break;
      }
      case 'completion': {
        if (effEx.unilateral) {
          data.doneL = document.getElementById('done-l')?.value === 'true';
          data.doneR = document.getElementById('done-r')?.value === 'true';
          const tL = parseInt(document.getElementById('time-l')?.value) || 0;
          const tR = parseInt(document.getElementById('time-r')?.value) || 0;
          if (tL) data.timeL = tL;
          if (tR) data.timeR = tR;
        } else {
          data.done = document.getElementById('done-main')?.value === 'true';
          const t = parseInt(document.getElementById('time-main')?.value) || 0;
          if (t) data.time = t;
        }
        break;
      }
      case 'multi_timer': {
        const dataInput = document.getElementById('mt-steps-data');
        let stepsData = [];
        try { stepsData = JSON.parse(dataInput?.value || '[]'); } catch {}
        data.timerSteps = stepsData;
        const allDone = effEx.timerSequence && stepsData.filter(s => s.done).length >= effEx.timerSequence.length;
        data.done = allDone;
        break;
      }
      case 'sled': {
        data.sets = [];
        for (let s = 0; s < (effEx.sets || 1); s++) {
          const w = document.querySelector(`.sled-weight[data-set="${s}"]`);
          const l = document.querySelector(`.sled-lengths[data-set="${s}"]`);
          const t = document.querySelector(`.sled-time[data-set="${s}"]`);
          const timeStr = t?.value || '';
          const parts = timeStr.split(':');
          const timeSeconds = parts.length === 2 ? (parseInt(parts[0]) || 0) * 60 + (parseInt(parts[1]) || 0) : parseInt(timeStr) || 0;
          data.sets.push({
            weight: w ? parseFloat(w.value) || 0 : 0,
            lengths: l ? parseInt(l.value) || 0 : 0,
            timeSeconds
          });
        }
        break;
      }
      case 'weight_distance': {
        data.sets = [];
        for (let s = 0; s < effEx.sets; s++) {
          const w = document.querySelector(`.wd-weight[data-set="${s}"]`);
          const d = document.querySelector(`.wd-distance[data-set="${s}"]`);
          data.sets.push({
            weight: w ? parseFloat(w.value) || 0 : 0,
            distance: d ? parseInt(d.value) || 0 : 0
          });
        }
        break;
      }
      case 'reps_only': {
        data.sets = [];
        if (effEx.unilateral === 'split_reps') {
          for (let s = 0; s < effEx.sets; s++) {
            data.sets.push({
              repsL: document.querySelector(`.rl-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rl-input[data-set="${s}"]`)?.value) || 0,
              repsR: document.querySelector(`.rr-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rr-input[data-set="${s}"]`)?.value) || 0,
            });
          }
        } else {
          for (let s = 0; s < effEx.sets; s++) {
            const r = document.querySelector(`.reps-input[data-set="${s}"]`);
            data.sets.push({ reps: r ? (r.value === '' ? '' : parseInt(r.value) || r.value) : '' });
          }
        }
        break;
      }
      case 'weight_reps': default: {
        if (effEx.unilateral === 'split_weight') {
          data.sets = [];
          for (let s = 0; s < effEx.sets; s++) {
            data.sets.push({
              weightL: parseFloat(document.querySelector(`.wl-input[data-set="${s}"]`)?.value) || 0,
              repsL: document.querySelector(`.rl-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rl-input[data-set="${s}"]`)?.value) || 0,
              weightR: parseFloat(document.querySelector(`.wr-input[data-set="${s}"]`)?.value) || 0,
              repsR: document.querySelector(`.rr-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rr-input[data-set="${s}"]`)?.value) || 0,
            });
          }
        } else if (effEx.unilateral === 'split_reps') {
          data.sets = [];
          for (let s = 0; s < effEx.sets; s++) {
            data.sets.push({
              weight: parseFloat(document.querySelector(`.sr-weight-input[data-set="${s}"]`)?.value) || 0,
              repsL: document.querySelector(`.rl-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rl-input[data-set="${s}"]`)?.value) || 0,
              repsR: document.querySelector(`.rr-input[data-set="${s}"]`)?.value === '' ? '' : parseInt(document.querySelector(`.rr-input[data-set="${s}"]`)?.value) || 0,
            });
          }
        } else {
          data.sets = [];
          for (let s = 0; s < effEx.sets; s++) {
            const wInput = document.querySelector(`.weight-input[data-set="${s}"]`);
            const rInput = document.querySelector(`.reps-input[data-set="${s}"]`);
            data.sets.push({
              weight: wInput ? parseFloat(wInput.value) || 0 : 0,
              reps: rInput ? (rInput.value === '' ? '' : parseInt(rInput.value) || rInput.value) : ''
            });
          }
        }
        break;
      }
    }

    State.logExercise(exIndex, data);
  }

  function saveExercise(workoutId, exIndex) {
    autoSaveExercise(workoutId, exIndex);
    Timer.cleanup();
    Router.go(`/w/${workoutId}`);
  }

  function saveAndBack(workoutId, exIndex) {
    autoSaveExercise(workoutId, exIndex);
    Timer.cleanup();
    // Check if this was the last real exercise
    const workout = PROGRAMME.find(w => w.id === workoutId);
    const wip = State.getWIP();
    if (workout && wip && wip.startedAt && !wip.completedAt) {
      const lastRealIndex = workout.exercises.reduce((last, ex, i) => ex.isFence ? last : i, -1);
      if (exIndex === lastRealIndex) {
        if (confirm('Last exercise done! End the session timer?')) {
          State.endTimer();
        }
      }
    }
    Router.go(`/w/${workoutId}`);
  }

  function updateBanner(exercise) {
    const bannerEl = document.getElementById('progression-banner');
    if (!bannerEl) return;
    const effEx = getEffectiveExercise(exercise);
    const trackingType = getEffectiveTrackingType(exercise);
    if (trackingType !== 'weight_reps' && trackingType !== 'reps_only') { bannerEl.innerHTML = ''; return; }

    const sets = [];
    if (effEx.unilateral === 'split_reps') {
      for (let s = 0; s < effEx.sets; s++) {
        const rl = document.querySelector(`.rl-input[data-set="${s}"]`);
        const rr = document.querySelector(`.rr-input[data-set="${s}"]`);
        if (rl?.value && rr?.value) sets.push({ repsL: rl.value, repsR: rr.value });
      }
    } else {
      for (let s = 0; s < effEx.sets; s++) {
        const rInput = document.querySelector(`.reps-input[data-set="${s}"]`);
        if (rInput?.value) sets.push({ reps: rInput.value });
      }
    }

    const banner = Progression.getBanner(sets, effEx);
    if (!banner) { bannerEl.innerHTML = ''; return; }
    const cls = banner.type === 'green' ? 'banner-green' : banner.type === 'amber' ? 'banner-amber' : 'banner-atg';
    const icon = banner.type === 'green' ? '✅ ' : banner.type === 'amber' ? '⚠️ ' : '💡 ';
    bannerEl.innerHTML = `<div class="progression-banner ${cls}">${icon}${banner.text}</div>`;
  }

  function findDataWarnings(workoutId) {
    const wip = State.getWIP();
    if (!wip) return [];
    const workout = PROGRAMME.find(w => w.id === workoutId);
    if (!workout) return [];
    const warnings = [];

    for (const [idx, data] of Object.entries(wip.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;
      if (!data.sets || data.sets.length === 0) continue;
      const name = ex.name;

      // Standard weight×reps: check for 0 weight when other sets have weight, or 0 reps
      const s0 = data.sets[0];
      if (s0.weight !== undefined && s0.reps !== undefined) {
        const weights = data.sets.map(s => parseFloat(s.weight) || 0);
        const reps = data.sets.map(s => parseInt(s.reps) || 0);
        const hasWeight = weights.some(w => w > 0);
        const hasReps = reps.some(r => r > 0);

        if (hasWeight) {
          const zeroWeightSets = weights.map((w, i) => w === 0 && reps[i] > 0 ? i + 1 : null).filter(Boolean);
          if (zeroWeightSets.length > 0) {
            warnings.push(`${name}: set${zeroWeightSets.length > 1 ? 's' : ''} ${zeroWeightSets.join(', ')} — weight is 0 but has reps`);
          }
        }
        if (hasReps) {
          const zeroRepSets = reps.map((r, i) => r === 0 && weights[i] > 0 ? i + 1 : null).filter(Boolean);
          if (zeroRepSets.length > 0) {
            warnings.push(`${name}: set${zeroRepSets.length > 1 ? 's' : ''} ${zeroRepSets.join(', ')} — has weight but reps is 0`);
          }
        }
      }

      // Split_reps: check L/R reps
      if (s0.repsL !== undefined) {
        const hasAnyReps = data.sets.some(s => (parseInt(s.repsL) || 0) > 0 || (parseInt(s.repsR) || 0) > 0);
        if (hasAnyReps) {
          const zeroSets = data.sets.map((s, i) => {
            const l = parseInt(s.repsL) || 0; const r = parseInt(s.repsR) || 0;
            if (l === 0 || r === 0) return i + 1;
            return null;
          }).filter(Boolean);
          if (zeroSets.length > 0 && zeroSets.length < data.sets.length) {
            warnings.push(`${name}: set${zeroSets.length > 1 ? 's' : ''} ${zeroSets.join(', ')} — missing L or R reps`);
          }
        }
      }
    }
    return warnings;
  }

  function finishWorkout(workoutId) {
    const warnings = findDataWarnings(workoutId);
    if (warnings.length > 0) {
      const msg = 'Some exercises may have missing data:\n\n' + warnings.join('\n') + '\n\nFinish anyway?';
      if (!confirm(msg)) return;
    }
    const session = State.finishSession();
    if (!session) return;
    // Flip chop direction after completing W6
    if (workoutId === 6) Data.flipChopDirection();
    // Store the index of this session for export tracking
    window._lastSessionIndex = Data.getSessions().length - 1;
    renderSummary(session);
  }

  function renderSummary(session) {
    const workout = PROGRAMME.find(w => w.id === session.workoutId);
    if (!workout) { renderHome(); return; }

    const md = Markdown.exportSession(session);

    let exerciseItems = '';
    for (const [idx, data] of Object.entries(session.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;

      let setsStr = '';
      if (data.done !== undefined || data.doneL !== undefined) {
        // Completion/duration — show hold times if available
        if (data.doneL !== undefined) {
          const tL = data.timeL ? ` ${Timer.formatTime(data.timeL)}` : '';
          const tR = data.timeR ? ` ${Timer.formatTime(data.timeR)}` : '';
          setsStr = `L: ${data.doneL ? '✅' : '—'}${tL}  R: ${data.doneR ? '✅' : '—'}${tR}`;
        } else {
          const t = data.time ? ` ${Timer.formatTime(data.time)}` : '';
          setsStr = (data.done ? '✅' : '—') + t;
        }
      } else if (data.sets && data.sets.length > 0) {
        const s0 = data.sets[0];
        if (s0.weightL !== undefined) {
          setsStr = data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L:${s.weightL||0}×${s.repsL||0} R:${s.weightR||0}×${s.repsR||0}`).join(' | ');
        } else if (s0.repsL !== undefined) {
          setsStr = `${data.weight||0}kg — ` + data.sets.filter(s => s.repsL !== '' || s.repsR !== '').map(s => `L${s.repsL}/R${s.repsR}`).join(' | ');
        } else if (s0.lengths !== undefined) {
          setsStr = data.sets.map(s => `${s.weight||0}kg × ${s.lengths}L @ ${Timer.formatTime(s.timeSeconds||0)}`).join(' | ');
        } else if (s0.distance !== undefined) {
          setsStr = data.sets.filter(s => s.distance).map(s => `${s.weight||0}kg/h × ${s.distance}m`).join(' | ');
        } else {
          setsStr = data.sets.filter(s => s.reps !== '' && s.reps !== undefined).map(s => `${s.weight || 'BW'}kg × ${s.reps}`).join(' | ');
        }
      }

      const variantLabel = data.variant ? ` [${data.variant}]` : '';

      exerciseItems += `
        <div class="summary-item">
          <div class="summary-name">${ex.name}${variantLabel}</div>
          <div class="summary-sets">${setsStr}</div>
          ${data.notes ? `<div class="summary-notes">${data.notes}</div>` : ''}
        </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <h1>Session Complete</h1>
      </div>
      <div class="content">
        <div style="text-align:center;margin-bottom:20px;">
          <div style="font-size:2rem;">💪</div>
          <div style="font-size:1.1rem;font-weight:600;">W${session.workoutId} — ${workout.name}</div>
          <div style="color:var(--text2);margin-top:4px;">${Markdown.formatDate(session.date)}</div>
          ${session.startedAt && session.completedAt ? `<div style="color:var(--text2);margin-top:4px;font-size:0.85rem;">${Timer.formatTimeOfDay(session.startedAt)} → ${Timer.formatTimeOfDay(session.completedAt)} (${Timer.formatDuration(new Date(session.completedAt) - new Date(session.startedAt))})</div>` : ''}
        </div>

        ${session.gym ? `<div style="text-align:center;font-size:0.85rem;color:var(--text2);margin-bottom:12px;">📍 ${session.gym}</div>` : ''}
        ${session.overall ? `<div class="summary-section"><h3>Overall</h3><div class="summary-item">${session.overall}</div></div>` : ''}
        ${session.injuries ? `<div class="summary-section"><h3>Injuries / Concerns</h3><div class="summary-item" style="color:var(--amber);">${session.injuries}</div></div>` : ''}

        <div class="summary-section">
          <h3>Exercises</h3>
          ${exerciseItems}
        </div>

        <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
          <button class="btn btn-primary" onclick="Views.copyMarkdown()">Copy as Markdown</button>
          <button class="btn btn-secondary" onclick="Views.shareMarkdown()">Share</button>
          <button class="btn btn-secondary" onclick="Router.go('/')">Done — Back to Home</button>
        </div>
      </div>`;

    // Store markdown for copy/share
    window._lastMarkdown = md;
  }

  async function copyMarkdown() {
    try {
      await navigator.clipboard.writeText(window._lastMarkdown || '');
      if (window._lastSessionIndex !== undefined) Data.markExported(window._lastSessionIndex);
      alert('Copied to clipboard!');
    } catch {
      prompt('Copy this markdown:', window._lastMarkdown || '');
    }
  }

  async function shareMarkdown() {
    if (navigator.share) {
      try {
        await navigator.share({
          title: 'Workout Session',
          text: window._lastMarkdown || ''
        });
        if (window._lastSessionIndex !== undefined) Data.markExported(window._lastSessionIndex);
      } catch { /* user cancelled */ }
    } else {
      copyMarkdown();
    }
  }

  function exportAll() {
    const md = Markdown.exportAll();
    window._lastMarkdown = md;
    if (navigator.share) {
      navigator.share({ title: 'Training Log', text: md }).catch(() => {});
    } else {
      navigator.clipboard.writeText(md)
        .then(() => alert('All sessions copied to clipboard!'))
        .catch(() => prompt('Copy:', md));
    }
  }

  function showImportModal() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.id = 'import-modal';
    overlay.innerHTML = `
      <div class="modal">
        <h2>Load History</h2>
        <p style="font-size:0.85rem;color:var(--text2);margin-bottom:10px;">
          Paste your training-log.md content below. Sessions will be added to your history.
        </p>
        <textarea id="import-text" placeholder="Paste markdown here..."></textarea>
        <div id="import-result"></div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="document.getElementById('import-modal').remove()">Cancel</button>
          <button class="btn btn-primary" onclick="Views.doImport()">Import</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.remove();
    });
  }

  function doImport() {
    const text = document.getElementById('import-text')?.value;
    if (!text) return;

    const result = Markdown.importMarkdown(text);
    const resultEl = document.getElementById('import-result');

    if (result.sessions.length === 0) {
      resultEl.innerHTML = `<div class="import-result" style="background:var(--red-bg);color:var(--red);">No sessions found. Check the format.</div>`;
      return;
    }

    // Add sessions to storage
    const existing = Data.getSessions();
    const combined = [...existing, ...result.sessions];
    Data.saveSessions(combined);

    let msg = `Imported ${result.sessions.length} session(s), ${result.matched} exercise(s) matched.`;
    if (result.unmatched > 0) {
      msg += ` ${result.unmatched} exercise(s) could not be matched: ${result.unmatchedNames.join(', ')}`;
    }

    resultEl.innerHTML = `<div class="import-result" style="background:var(--green-bg);color:var(--green);">${msg}</div>`;

    // Re-init state to pick up new history
    State.init();

    setTimeout(() => {
      document.getElementById('import-modal')?.remove();
      renderHome();
    }, 2000);
  }

    let sessionRows = '';

      sessionRows = '<div style="color:var(--text3);text-align:center;padding:20px;">No sessions recorded yet.</div>';

            </div>
            <button class="btn btn-secondary" style="flex:none;padding:8px 12px;font-size:0.8rem;width:auto;" onclick="Views.exportSingleSession(${i})">Export</button>
            <button class="btn btn-secondary" style="flex:none;padding:8px 10px;font-size:0.8rem;width:auto;color:var(--red);border-color:var(--red);" onclick="Views.deleteSession(${i})">✕</button>
          </div>`;
      }
    }

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Router.go('/')">← Home</button>
        <h1>Settings & History</h1>
      </div>
      <div class="content">
        <div class="summary-section">
          <h3>Session History (${sessions.length} total)</h3>
          ${sessionRows}
        </div>

        <div style="margin-top:24px;display:flex;flex-direction:column;gap:10px;">
          <button class="btn btn-secondary" onclick="Views.exportAll()">Export All Sessions</button>
          <button class="btn btn-secondary" onclick="Views.showImportModal()">Load History (Import)</button>
        </div>

        <div style="text-align:center;margin-top:24px;font-size:0.75rem;color:var(--text3);">
          Exercise Tracker v1.0
        </div>
      </div>`;
  }

  function exportSingleSession(sessionIndex) {
    const sessions = Data.getSessions();
    const session = sessions[sessionIndex];
    if (!session) return;

    const md = Markdown.exportSession(session);
    window._lastMarkdown = md;
    window._lastSessionIndex = sessionIndex;

    if (navigator.share) {
      navigator.share({ title: 'Workout Session', text: md })
        .then(() => {
          Data.markExported(sessionIndex);
          renderSettings(); // refresh to show updated export status
        })
        .catch(() => {});
    } else {
      navigator.clipboard.writeText(md)
        .then(() => {
          Data.markExported(sessionIndex);
          alert('Session copied to clipboard!');
          renderSettings();
        })
        .catch(() => prompt('Copy:', md));
    }
  }

  function deleteSession(sessionIndex) {
    if (!confirm('Delete this session? This cannot be undone.')) return;
    const sessions = Data.getSessions();
    sessions.splice(sessionIndex, 1);
    Data.saveSessions(sessions);
    renderSettings();
  }

  // ---- Shared helper: format exercise data as compact string ----
  function formatExerciseDataCompact(data, ex) {
    if (data.done !== undefined || data.doneL !== undefined) {
      if (data.doneL !== undefined) {
        const tL = data.timeL ? `(${data.timeL}s)` : '';
        const tR = data.timeR ? `(${data.timeR}s)` : '';
        return `L${data.doneL ? '✅' : '—'}${tL} R${data.doneR ? '✅' : '—'}${tR}`;
      }
      const t = data.time ? `(${data.time}s)` : '';
      return `${data.done ? '✅' : '—'}${t}`;
    }
    if (!data.sets || data.sets.length === 0) return '—';
    const s0 = data.sets[0];
    const wLabel = ex?.weightLabel || 'kg';
    if (s0.lengths !== undefined) {
      return data.sets.map(s => `${s.weight||0}${wLabel} × ${s.lengths}L ${Timer.formatTime(s.timeSeconds||0)}`).join(', ');
    }
    if (s0.distance !== undefined) {
      return data.sets.map(s => `${s.weight||0}${wLabel}/h × ${s.distance}m`).join(', ');
    }
    if (s0.weightL !== undefined) {
      return data.sets.map(s => `L:${s.weightL||0}×${s.repsL||0} R:${s.weightR||0}×${s.repsR||0}`).join(', ');
    }
    if (s0.repsL !== undefined) {
      // New format: per-set weight; old format: shared data.weight
      if (s0.weight !== undefined) {
        const weights = data.sets.map(s => parseFloat(s.weight) || 0);
        const allSameW = weights.every(w => Math.abs(w - weights[0]) < 0.01);
        if (allSameW) {
          return `${weights[0]}${wLabel} — ` + data.sets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
        }
        return data.sets.map(s => `${s.weight||0}${wLabel} L${s.repsL}/R${s.repsR}`).join(', ');
      }
      return `${data.weight||0}${wLabel} — ` + data.sets.map(s => `L${s.repsL}/R${s.repsR}`).join(', ');
    }
    // Standard weight×reps
    const validSets = data.sets.filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '' && parseInt(s.reps) !== 0);
    if (validSets.length === 0) return '—';
    const weights = validSets.map(s => parseFloat(s.weight) || 0);
    const allSame = weights.length > 0 && weights.every(w => Math.abs(w - weights[0]) < 0.01);
    if (allSame) {
      return `${validSets.length}×[${validSets.map(s => s.reps).join(', ')}] @ ${weights[0] ? weights[0] + wLabel : 'BW'}`;
    }
    return `${validSets.length}×[${validSets.map(s => `${s.reps}@${parseFloat(s.weight)||0}`).join(', ')}] ${wLabel}`;
  }

  // ---- Format sets as readable HTML rows (not export format) ----
  function formatSetsReadable(data, ex) {
    const wLabel = ex?.weightLabel || 'kg';
    if (data.done !== undefined || data.doneL !== undefined) {
      if (data.doneL !== undefined) {
        const tL = data.timeL ? ` (${Timer.formatTime(data.timeL)})` : '';
        const tR = data.timeR ? ` (${Timer.formatTime(data.timeR)})` : '';
        return `<div class="sd-sets"><div class="sd-set">L: ${data.doneL ? '✅' : '—'}${tL}</div><div class="sd-set">R: ${data.doneR ? '✅' : '—'}${tR}</div></div>`;
      }
      const t = data.time ? ` (${Timer.formatTime(data.time)})` : '';
      return `<div class="sd-sets"><div class="sd-set">${data.done ? '✅' : '—'}${t}</div></div>`;
    }
    if (!data.sets || data.sets.length === 0) return '<div class="sd-sets"><div class="sd-set">—</div></div>';
    const s0 = data.sets[0];

    if (s0.lengths !== undefined) {
      const sledLength = Data.getSledLength();
      return `<div class="sd-sets">${data.sets.map((s, i) => {
        const dist = s.lengths * sledLength;
        return `<div class="sd-set"><span class="sd-num">${i+1}</span> ${s.weight||0}${wLabel} · ${s.lengths}L · ${Timer.formatTime(s.timeSeconds||0)}${dist ? ` (~${Math.round(dist)}m)` : ''}</div>`;
      }).join('')}</div>`;
    }
    if (s0.distance !== undefined) {
      return `<div class="sd-sets">${data.sets.map((s, i) =>
        `<div class="sd-set"><span class="sd-num">${i+1}</span> ${s.weight||0}${wLabel}/hand · ${s.distance}m</div>`
      ).join('')}</div>`;
    }
    if (s0.weightL !== undefined) {
      return `<div class="sd-sets">${data.sets.map((s, i) =>
        `<div class="sd-set"><span class="sd-num">${i+1}</span> L: ${s.weightL||0}${wLabel}×${s.repsL||0} · R: ${s.weightR||0}${wLabel}×${s.repsR||0}</div>`
      ).join('')}</div>`;
    }
    if (s0.repsL !== undefined) {
      // New format: per-set weight; old format: shared data.weight
      if (s0.weight !== undefined) {
        return `<div class="sd-sets">${data.sets.map((s, i) =>
          `<div class="sd-set"><span class="sd-num">${i+1}</span> ${s.weight||0}${wLabel} · L: ${s.repsL} · R: ${s.repsR}</div>`
        ).join('')}</div>`;
      }
      const w = data.weight || 0;
      return `<div class="sd-sets"><div class="sd-set" style="margin-bottom:4px;">${w}${wLabel}</div>${data.sets.map((s, i) =>
        `<div class="sd-set"><span class="sd-num">${i+1}</span> L: ${s.repsL} · R: ${s.repsR}</div>`
      ).join('')}</div>`;
    }
    // Standard weight×reps
    const validSets = data.sets.filter(s => s.reps !== null && s.reps !== undefined && s.reps !== '' && parseInt(s.reps) !== 0);
    if (validSets.length === 0) return '<div class="sd-sets"><div class="sd-set">—</div></div>';
    return `<div class="sd-sets">${validSets.map((s, i) =>
      `<div class="sd-set"><span class="sd-num">${i+1}</span> ${parseFloat(s.weight)||0}${wLabel} × ${s.reps}</div>`
    ).join('')}</div>`;
  }

  // ---- Session Detail View ----
  function renderSessionDetail(sessionIndex) {
    const sessions = Data.getSessions();
    const session = sessions[sessionIndex];
    if (!session) { Router.go('/settings'); return; }
    const workout = PROGRAMME.find(w => w.id === session.workoutId);
    if (!workout) { Router.go('/settings'); return; }

    let rows = '';
    for (const [idx, data] of Object.entries(session.exercises)) {
      const ex = workout.exercises[parseInt(idx)];
      if (!ex || ex.isFence) continue;
      const displayName = Markdown.resolveDisplayName(ex, data);
      const setsHtml = formatSetsReadable(data, ex);
      rows += `
        <div class="session-detail-item">
          <div class="session-detail-name">${displayName}</div>
          ${setsHtml}
          ${data.notes ? `<div class="session-detail-notes">${data.notes}</div>` : ''}
        </div>`;
    }

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="Router.go('/settings')">← Settings</button>
        <h1>Session Detail</h1>
      </div>
      <div class="content">
        <div class="summary-section">
          <h3>W${session.workoutId} — ${Markdown.formatDate(session.date)}</h3>
          <div style="font-size:0.8rem;color:var(--text3);margin-bottom:12px;">${workout.name} · ${Object.keys(session.exercises).length} exercises${session.gym ? ` · ${session.gym}` : ''}</div>
          ${session.overall ? `<div style="margin-bottom:8px;"><strong>Overall:</strong> ${session.overall}</div>` : ''}
          ${session.injuries ? `<div style="margin-bottom:8px;"><strong>Injuries:</strong> ${session.injuries}</div>` : ''}
          ${rows}
        </div>
      </div>`;
  }

  // ---- Exercise History Page ----
  function renderExerciseHistory(exerciseId) {
    // Find exercise definition across all workouts
    let exDef = null;
    for (const w of PROGRAMME) {
      const found = w.exercises.find(e => e.id === exerciseId);
      if (found) { exDef = found; break; }
    }
    if (!exDef) { Router.go('/'); return; }

    const history = State.getExerciseHistory(exerciseId);
    const userCues = Data.getUserCues(exerciseId);
    const structuredCues = getStructuredCues(exDef);
    const defaultCuesText = structuredCues
      ? [
          ...(structuredCues.setup || []).map(s => `Setup: ${s}`),
          ...(structuredCues.exec || []).map(s => `Do: ${s}`),
          ...(structuredCues.mistakes || []).map(s => `Don't: ${s}`),
          ...(structuredCues.you || []).map(s => `You: ${s}`)
        ].join('\n')
      : (exDef.formCues || '');

    const displayCues = userCues !== null ? userCues : defaultCuesText;

    // History entries
    let entriesHtml = '';
    if (history.length === 0) {
      entriesHtml = '<div style="color:var(--text3);text-align:center;padding:20px;">No sessions recorded yet.</div>';
    } else {
      for (const h of history.slice(0, 15)) {
        const dataStr = formatExerciseDataCompact(h.data, h.exercise);
        entriesHtml += `
          <div class="history-entry">
            <div class="history-entry-date">W${h.workoutId} — ${Markdown.formatDate(h.date)}</div>
            <div class="history-entry-data">${dataStr}</div>
            ${h.data.notes ? `<div class="history-entry-notes">${h.data.notes}</div>` : ''}
          </div>`;
      }
    }

    // Collect all notes for copy button
    const allNotes = history.filter(h => h.data.notes).map(h => `${Markdown.formatDate(h.date)}: ${h.data.notes}`).join('\n\n');

    app.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="history.back()">← Back</button>
        <h1>${exDef.name}</h1>
      </div>
      <div class="content">
        ${displayCues ? `<div class="history-cues">
          <div class="history-cues-label">Form Cues</div>
          <div class="history-cues-text">${displayCues}</div>
        </div>` : ''}

        <div class="summary-section">
          <h3>Recent Sessions (${history.length})</h3>
          ${entriesHtml}
        </div>

        ${allNotes ? `
        <div style="margin-top:16px;">
          <button class="btn btn-secondary" style="width:100%;font-size:0.85rem;" onclick="Views.copyNotesHistory('${exerciseId}')">Copy all notes for AI review</button>
        </div>` : ''}
      </div>`;
  }


  function copyNotesHistory(exerciseId) {
    const history = State.getExerciseHistory(exerciseId);
    let exName = exerciseId;
    for (const w of PROGRAMME) {
      const found = w.exercises.find(e => e.id === exerciseId);
      if (found) { exName = found.name; break; }
    }
    const text = `# ${exName} — Notes History\n\n` +
      history.filter(h => h.data.notes).map(h => `**${Markdown.formatDate(h.date)}** (W${h.workoutId}):\n${h.data.notes}`).join('\n\n');

    if (navigator.share) {
      navigator.share({ title: `${exName} Notes`, text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text)
        .then(() => alert('Notes copied to clipboard!'))
        .catch(() => prompt('Copy:', text));
    }
  }

  function _syncSessionNotes() {
    const overall = document.getElementById('overall-notes')?.value || '';
    const injuries = document.getElementById('injury-notes')?.value || '';
    const gymSel = document.getElementById('gym-select');
    const gym = gymSel ? gymSel.value : undefined;
    State.updateSessionNotes(overall, injuries, gym);
  }

  function _addNewGym() {
    const name = prompt('Enter new gym name:');
    if (name && name.trim()) {
      Data.addGym(name.trim());
      // Re-render to show updated select
      const wip = State.getWIP();
      if (wip) renderWorkout(wip.workoutId);
    } else {
      // Reset select to previous value
      const gymSel = document.getElementById('gym-select');
      if (gymSel) gymSel.value = State.getWIP()?.gym || Data.getLastGym();
    }
  }

  return { renderHome, renderWorkout, renderExercise, autoSaveExercise, saveExercise, saveAndBack, updateBanner, finishWorkout, renderSummary, copyMarkdown, shareMarkdown, exportAll, showImportModal, doImport, renderSettings, exportSingleSession, deleteSession, switchVariant, toggleChopDirection, adjustTime, setTimeManual, _triggerAutoSave, _updateSledDerived, _multiTimerAction, renderSessionDetail, renderExerciseHistory, copyNotesHistory, _syncSessionNotes, _addNewGym };
})();

// =====================================================
// ROUTER — hash-based SPA routing
// =====================================================
const Router = (function() {
  function parseHash() {
    const hash = location.hash.slice(1) || '/';
    const parts = hash.split('/').filter(Boolean);

    if (parts[0] === 'w' && parts.length === 2) {
      return { view: 'workout', workoutId: parseInt(parts[1]) };
    }
    if (parts[0] === 'w' && parts[1] && parts[2] === 'e' && parts[3] !== undefined) {
      return { view: 'exercise', workoutId: parseInt(parts[1]), exIndex: parseInt(parts[3]) };
    }
    if (parts[0] === 'w' && parts[1] && parts[2] === 'summary') {
      return { view: 'summary', workoutId: parseInt(parts[1]) };
    }
    if (parts[0] === 'settings') {
      return { view: 'settings' };
    }
    if (parts[0] === 'session' && parts[1] !== undefined) {
      return { view: 'sessionDetail', sessionIndex: parseInt(parts[1]) };
    }
    if (parts[0] === 'exercise' && parts[1]) {
      return { view: 'exerciseHistory', exerciseId: parts[1] };
    }
    return { view: 'home' };
  }

  function clearSessionClock() {
    if (window._sessionClockInterval) { clearInterval(window._sessionClockInterval); window._sessionClockInterval = null; }
  }

  function route() {
    clearSessionClock();
    const r = parseHash();
    switch (r.view) {
      case 'workout': Views.renderWorkout(r.workoutId); break;
      case 'exercise': Views.renderExercise(r.workoutId, r.exIndex); break;
      case 'settings': Views.renderSettings(); break;
      case 'sessionDetail': Views.renderSessionDetail(r.sessionIndex); break;
      case 'exerciseHistory': Views.renderExerciseHistory(r.exerciseId); break;
      case 'home': default: Views.renderHome(); break;
    }
  }

  function go(path) {
    location.hash = path;
  }

  function init() {
    window.addEventListener('hashchange', route);
    route();
  }

  return { init, go };
})();

// =====================================================
// APP VERSION + AUTO-UPDATE CHECK
// =====================================================
const APP_VERSION = '1.3.0';

// =====================================================
// APP INIT
// =====================================================
(function() {
  State.init();
  Router.init();

  // Check for updates on load — fetch self with cache-bust, compare version
  if (location.protocol === 'https:') {
    setTimeout(() => {
      fetch(location.href.split('#')[0] + '?_v=' + Date.now(), { cache: 'no-store' })
        .then(r => r.text())
        .then(html => {
          const match = html.match(/APP_VERSION\s*=\s*'([^']+)'/);
          if (match && match[1] !== APP_VERSION) {
            const banner = document.createElement('div');
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;padding:10px 16px;background:#2563eb;color:white;font-size:0.85rem;text-align:center;z-index:9999;cursor:pointer;';
            banner.textContent = 'Update available — tap to reload';
            banner.onclick = () => location.reload(true);
            document.body.appendChild(banner);
          }
        })
        .catch(() => {}); // silently fail if offline
    }, 2000);
  }

  // Register service worker for offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
