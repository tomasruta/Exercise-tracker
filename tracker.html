<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Exercise Tracker</title>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}
input, textarea, button, select { font-family: inherit; font-size: inherit; }

/* ===== THEME ===== */
:root {
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-input: #f0f0f0;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --border: #e0e0e0;
  --accent: #2563eb;
  --green: #16a34a;
  --green-bg: #dcfce7;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --ss-color: #6366f1;
  --ss-bg: #eef2ff;
  --fence-color: #f59e0b;
  --fence-bg: #fffbeb;
  --new-badge: #8b5cf6;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f0f;
    --bg-card: #1c1c1e;
    --bg-input: #2c2c2e;
    --text: #e5e5e5;
    --text2: #aaa;
    --text3: #777;
    --border: #333;
    --green-bg: #052e16;
    --amber-bg: #451a03;
    --red-bg: #450a0a;
    --ss-bg: #1e1b4b;
    --fence-bg: #451a03;
  }
}

/* ===== LAYOUT ===== */
#app { max-width: 500px; margin: 0 auto; padding-bottom: env(safe-area-inset-bottom, 20px); }
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 1.1rem; font-weight: 600; flex: 1; }
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 1rem; cursor: pointer; padding: 8px 4px;
  min-width: 44px; min-height: 44px; display: flex; align-items: center;
}
.content { padding: 16px; }

/* ===== HOME ===== */
.workout-grid { display: flex; flex-direction: column; gap: 12px; }
.workout-btn {
  display: flex; align-items: center; gap: 14px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  cursor: pointer; text-align: left; width: 100%;
  min-height: 64px; transition: background 0.15s;
}
.workout-btn:active { background: var(--bg-input); }
.workout-next { border-color: var(--accent); border-width: 2px; box-shadow: 0 0 0 1px var(--accent); }
.workout-id {
  font-size: 1.3rem; font-weight: 700; color: var(--accent);
  min-width: 40px;
}
.workout-info { flex: 1; }
.workout-name { font-size: 0.95rem; font-weight: 600; display: block; }
.workout-sub { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.home-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
.btn {
  display: block; width: 100%; padding: 14px;
  border: none; border-radius: 10px; font-size: 1rem;
  font-weight: 600; cursor: pointer; text-align: center;
  min-height: 48px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--bg-card); color: var(--text); border: 1px solid var(--border); }
.btn-success { background: var(--green); color: #fff; }
.btn-amber { background: var(--amber); color: #fff; }
.btn:active { opacity: 0.85; }

/* ===== WORKOUT LIST ===== */
.exercise-list { display: flex; flex-direction: column; gap: 2px; }
.ss-group {
  border-left: 3px solid var(--ss-color);
  background: var(--ss-bg);
  border-radius: 0 10px 10px 0;
  margin: 4px 0;
}
.ss-label {
  font-size: 0.7rem; font-weight: 700; color: var(--ss-color);
  padding: 4px 10px 0; text-transform: uppercase; letter-spacing: 0.5px;
}
.ex-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer;
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  min-height: 52px;
}
.ss-group .ex-row { background: transparent; border-bottom: 1px solid var(--border); }
.ss-group .ex-row:last-child { border-bottom: none; }
.ex-num { font-size: 0.8rem; color: var(--text3); min-width: 22px; text-align: right; }
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 0.95rem; font-weight: 500; }
.ex-meta { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.ex-status { font-size: 1.1rem; min-width: 28px; text-align: center; }
.badge {
  display: inline-block; font-size: 0.65rem; font-weight: 700;
  padding: 1px 5px; border-radius: 4px; vertical-align: middle; margin-left: 4px;
}
.badge-new { background: var(--new-badge); color: #fff; }
.badge-ss { background: var(--ss-color); color: #fff; }

/* ===== MALTO FENCE ===== */
.malto-fence {
  display: flex; align-items: center; gap: 10px;
  background: var(--fence-bg); border: 2px solid var(--fence-color);
  border-radius: 10px; padding: 10px 14px; margin: 10px 0;
  font-weight: 700; font-size: 0.85rem; color: var(--fence-color);
}

/* ===== EXERCISE DETAIL ===== */
.ex-detail { padding-bottom: 100px; }
.ex-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
.ex-target { font-size: 1rem; color: var(--text2); margin-bottom: 12px; }
.cue-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.cue-toggle {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; font-weight: 600; font-size: 0.9rem;
  background: none; border: none; width: 100%; text-align: left;
  color: var(--text); padding: 0;
}
.cue-toggle::after { content: '▼'; font-size: 0.7rem; color: var(--text3); transition: transform 0.2s; }
.cue-section.collapsed .cue-toggle::after { transform: rotate(-90deg); }
.cue-body { margin-top: 8px; font-size: 0.85rem; color: var(--text2); line-height: 1.5; }
.cue-section.collapsed .cue-body { display: none; }
.cue-label { font-weight: 700; font-size: 0.8rem; color: var(--text); margin: 8px 0 2px; text-transform: uppercase; letter-spacing: 0.03em; }
.cue-label:first-child { margin-top: 0; }
.cue-list { margin: 0; padding-left: 1.2em; }
.cue-list li { margin-bottom: 2px; }
.cue-list.mistakes { list-style: none; padding-left: 0; }
.cue-list.mistakes li::before { content: '❌ '; }
.cue-list.you { list-style: none; padding-left: 0; color: var(--text3); font-style: italic; }
.cue-list.you li::before { content: '→ '; }
.chop-direction { display: inline-block; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
.chop-direction:active { opacity: 0.7; }
.last-session {
  background: var(--bg-input); border-radius: 10px;
  padding: 12px; margin-bottom: 16px; font-size: 0.85rem;
}
.last-session-title { font-weight: 600; margin-bottom: 4px; color: var(--text2); }

/* ===== SET INPUTS ===== */
.sets-header {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr;
  gap: 8px; padding: 0 4px 6px; font-size: 0.75rem;
  color: var(--text3); font-weight: 600; text-transform: uppercase;
}
.set-row {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr;
  gap: 8px; align-items: center; margin-bottom: 8px;
}
.set-label {
  font-size: 0.85rem; font-weight: 600; color: var(--text2);
  text-align: center; padding: 10px 0;
}
.set-input {
  width: 100%; padding: 12px 10px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 8px; font-size: 1.15rem; font-weight: 600;
  color: var(--text); text-align: center;
  min-height: 48px;
}
.set-input:focus { border-color: var(--accent); outline: none; }
.set-x { text-align: center; color: var(--text3); font-weight: 600; }
.bump-note {
  font-size: 0.8rem; color: var(--green); margin-top: -4px; margin-bottom: 8px;
  padding-left: 54px;
}

.notes-field {
  width: 100%; padding: 12px; margin-top: 12px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 10px; font-size: 0.95rem; color: var(--text);
  resize: vertical; min-height: 60px; line-height: 1.4;
}
.notes-field:focus { border-color: var(--accent); outline: none; }
.notes-field::placeholder { color: var(--text3); }

/* ===== PROGRESSION BANNER ===== */
.progression-banner {
  padding: 10px 14px; border-radius: 10px; font-size: 0.9rem;
  font-weight: 600; margin-top: 12px;
}
.banner-green { background: var(--green-bg); color: var(--green); }
.banner-amber { background: var(--amber-bg); color: var(--amber); }
.banner-atg { background: var(--bg-input); color: var(--text2); }

/* ===== FIXED SAVE BAR ===== */
.save-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 8px 16px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
  background: var(--bg); border-top: 1px solid var(--border);
  z-index: 100; display: flex; gap: 10px; align-items: center; justify-content: space-between;
  max-width: 500px; margin: 0 auto;
}
.save-bar .auto-saved { font-size: 0.75rem; color: var(--text3); }
.save-bar .done-btn { padding: 10px 24px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; background: var(--accent); color: #fff; border: none; cursor: pointer; }

/* ===== SUMMARY ===== */
.summary-item {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 8px;
}
.summary-name { font-weight: 600; font-size: 0.95rem; }
.summary-sets { font-size: 0.85rem; color: var(--text2); margin-top: 4px; }
.summary-notes { font-size: 0.85rem; color: var(--text3); margin-top: 4px; font-style: italic; }
.summary-section { margin-bottom: 20px; }
.summary-section h3 { font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ===== IMPORT MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  background: var(--bg); border-radius: 16px 16px 0 0;
  padding: 20px; width: 100%; max-width: 500px;
  max-height: 80vh; overflow-y: auto;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
}
.modal h2 { font-size: 1.1rem; margin-bottom: 12px; }
.modal textarea {
  width: 100%; min-height: 200px; padding: 12px;
  background: var(--bg-input); border: 2px solid var(--border);
  border-radius: 10px; font-size: 0.85rem; color: var(--text);
  font-family: monospace; resize: vertical;
}
.modal-actions { display: flex; gap: 10px; margin-top: 12px; }
.modal-actions .btn { flex: 1; }
.import-result { margin-top: 12px; padding: 12px; border-radius: 10px; font-size: 0.85rem; }

/* ===== VARIANT PILLS ===== */
.variant-pills { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.variant-pill {
  padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
  border: 2px solid var(--border); background: var(--bg-card); color: var(--text2);
  cursor: pointer; min-height: 36px;
}
.variant-pill.active { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ===== TIMER ===== */
.timer-block { margin-bottom: 16px; }
.timer-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
}
.timer-side { font-weight: 600; font-size: 0.85rem; color: var(--text2); min-width: 44px; }
.partial-status { font-size: 0.75rem; color: var(--amber); font-weight: 600; }
.timer-display { font-size: 2.5rem; font-weight: 700; font-variant-numeric: tabular-nums; flex: 1; text-align: center; }
.timer-btn {
  padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 700;
  border: none; cursor: pointer; min-height: 40px; min-width: 72px;
}
.timer-btn-start { background: var(--green); color: #fff; }
.timer-btn-pause { background: var(--amber); color: #fff; }
.timer-btn-done { background: var(--green-bg); color: var(--green); }
.timer-goal { font-size: 0.85rem; color: var(--text-secondary); font-weight: 400; margin-left: 4px; }
.timer-past-goal { color: var(--green); font-weight: 800; }
.timer-goal-flash { animation: goalFlash 0.5s ease-out 3; }
@keyframes goalFlash { 0%, 100% { background: transparent; } 50% { background: var(--green-bg); } }
.time-adjust { display: flex; gap: 8px; justify-content: center; margin-top: 6px; }
.time-adjust-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
  border: 1px solid var(--border); background: var(--bg-input); color: var(--text2);
  cursor: pointer; min-height: 36px;
}
.time-adjust-btn:active { background: var(--border); }

/* ===== PEEK VIEW ===== */
.peek-section {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; margin-top: 16px; overflow: hidden;
}
.peek-toggle {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer; font-weight: 600; font-size: 0.85rem;
  background: none; border: none; width: 100%; text-align: left;
  color: var(--text2); padding: 10px 14px;
}
.peek-toggle::after { content: '▼'; font-size: 0.65rem; color: var(--text3); transition: transform 0.2s; }
.peek-section.collapsed .peek-toggle::after { transform: rotate(-90deg); }
.peek-body { border-top: 1px solid var(--border); }
.peek-section.collapsed .peek-body { display: none; }
.peek-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; font-size: 0.85rem;
}
.peek-row:last-child { border-bottom: none; }
.peek-row:active { background: var(--bg-input); }
.peek-num { font-size: 0.75rem; color: var(--text3); min-width: 20px; text-align: right; }
.peek-name { flex: 1; font-weight: 500; }
.peek-meta { font-size: 0.75rem; color: var(--text3); }
.peek-fence { padding: 8px 14px; font-size: 0.75rem; color: var(--fence-color); font-weight: 600; border-bottom: 1px solid var(--border); }
.peek-fence:last-child { border-bottom: none; }

/* ===== COMPLETION TOGGLES ===== */
/* ===== MULTI TIMER ===== */
.multi-timer-block { display: flex; flex-direction: column; gap: 6px; }
.multi-timer-step {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-radius: 10px;
  background: var(--bg-card); border: 1px solid var(--border);
  min-height: 52px;
}
.multi-timer-step.active { border-color: var(--accent); background: var(--ss-bg); }
.multi-timer-step.done { border-color: var(--green); background: var(--green-bg); }
.multi-timer-step-num { font-size: 0.75rem; font-weight: 700; color: var(--text3); min-width: 20px; text-align: center; }
.multi-timer-step-info { flex: 1; min-width: 0; }
.multi-timer-step-label { font-size: 0.85rem; font-weight: 600; }
.multi-timer-step-time { font-size: 0.8rem; color: var(--text2); margin-top: 2px; }
.multi-timer-display {
  font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums;
  min-width: 55px; text-align: center;
}
.multi-timer-btn {
  padding: 8px 14px; border: none; border-radius: 8px;
  font-size: 0.85rem; font-weight: 700; cursor: pointer; min-width: 70px;
  min-height: 44px;
}
.multi-timer-btn-start { background: var(--accent); color: #fff; }
.multi-timer-btn-pause { background: var(--amber); color: #fff; }
.multi-timer-btn-done { background: var(--green); color: #fff; }
.multi-timer-btn-waiting { background: var(--bg-input); color: var(--text3); }

.completion-row {
  display: flex; align-items: center; gap: 16px; justify-content: center;
  padding: 16px; margin-bottom: 12px;
}
.completion-toggle {
  display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
}
.completion-toggle .check-box {
  width: 56px; height: 56px; border-radius: 12px; font-size: 1.5rem;
  display: flex; align-items: center; justify-content: center;
  border: 3px solid var(--border); background: var(--bg-card); transition: all 0.15s;
}
.completion-toggle.done .check-box { border-color: var(--green); background: var(--green-bg); }
.completion-toggle .check-label { font-size: 0.8rem; font-weight: 600; color: var(--text2); }

/* ===== UNILATERAL SETS ===== */
.uni-set-group { margin-bottom: 12px; }
.uni-set-label { font-size: 0.85rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; padding-left: 4px; }
.uni-side-row {
  display: grid; grid-template-columns: 28px 1fr 24px 1fr; gap: 6px;
  align-items: center; margin-bottom: 4px;
}
.uni-side-label { font-size: 0.75rem; font-weight: 700; color: var(--text3); text-align: center; }

/* Split reps: per-set weight + L/R reps */
.split-reps-header {
  display: grid; grid-template-columns: 50px 1fr 24px 1fr 24px 1fr; gap: 6px;
  padding: 0 0 6px; font-size: 0.75rem; color: var(--text3); font-weight: 600; text-transform: uppercase;
}
.split-reps-row {
  display: grid; grid-template-columns: 50px 1fr 24px 1fr 24px 1fr; gap: 6px;
  align-items: center; margin-bottom: 8px;
}

/* ===== SLED TRACKING ===== */
.sled-persistent {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px; margin-bottom: 12px;
}
.sled-persistent label { font-size: 0.85rem; font-weight: 600; color: var(--text2); }
.sled-persistent input { width: 80px; margin: 0 8px; }
.sled-set-row {
  display: grid; grid-template-columns: 50px 1fr 1fr 1fr auto; gap: 6px;
  align-items: center; margin-bottom: 8px;
}
.sled-derived { font-size: 0.8rem; color: var(--text3); padding-left: 54px; margin-top: -4px; margin-bottom: 8px; }
.stopwatch-btn {
  padding: 0; border-radius: 8px; font-size: 1.5rem; font-weight: 700;
  border: 1px solid var(--border); background: var(--bg-card); cursor: pointer;
  height: 44px; width: 48px;
  display: inline-flex; align-items: center; justify-content: center;
}
.stopwatch-btn.running {
  background: var(--red); color: #fff; border-color: var(--red);
  font-size: 0.85rem; font-variant-numeric: tabular-nums;
  width: 64px;
}

/* ===== WEIGHT/DISTANCE ===== */
.wd-set-row {
  display: grid; grid-template-columns: 50px 1fr 30px 1fr; gap: 8px;
  align-items: center; margin-bottom: 8px;
}

/* ===== WORKOUT NOTES ===== */
.workout-notes { margin-top: 20px; padding-top: 16px; border-top: 2px solid var(--border); }
.workout-notes label { display: block; font-weight: 600; font-size: 0.9rem; margin-bottom: 6px; color: var(--text2); }
.workout-notes .notes-field { margin-top: 0; margin-bottom: 12px; }

/* ===== SESSION DETAIL VIEW ===== */
.session-detail-item {
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.session-detail-item:last-child { border-bottom: none; }
.session-detail-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 6px; }
.session-detail-notes { font-size: 0.8rem; color: var(--text3); font-style: italic; margin-top: 6px; white-space: pre-wrap; }
.sd-sets { display: flex; flex-direction: column; gap: 2px; }
.sd-set { font-size: 0.85rem; color: var(--text2); padding: 2px 0; }
.sd-num {
  display: inline-block; width: 18px; height: 18px; line-height: 18px;
  text-align: center; border-radius: 50%; background: var(--bg-input);
  font-size: 0.7rem; font-weight: 600; color: var(--text3); margin-right: 6px;
}

/* ===== EXERCISE HISTORY PAGE ===== */
.history-cues {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; margin-bottom: 16px;
}
.history-cues-label { font-weight: 600; font-size: 0.85rem; color: var(--text2); margin-bottom: 8px; }
.history-cues-text { font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
.history-entry {
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.history-entry:last-child { border-bottom: none; }
.history-entry-date { font-size: 0.8rem; color: var(--text3); margin-bottom: 4px; }
.history-entry-data { font-weight: 500; font-size: 0.9rem; }
.history-entry-notes { font-size: 0.8rem; color: var(--text3); font-style: italic; margin-top: 4px; white-space: pre-wrap; }
.history-link {
  display: inline-block; font-size: 0.8rem; color: var(--accent);
  text-decoration: none; margin-top: 6px; cursor: pointer;
}
.history-link:active { opacity: 0.7; }
</style>

// =====================================================
// DATA MODULE — localStorage read/write
// =====================================================
const Data = (function() {
  const SESSIONS_KEY = 'gym-sessions';
  const WIP_KEY = 'gym-session-wip';
  const SLED_LENGTH_KEY = 'gym-sled-length-distance';
  const VARIANT_PREFIX = 'gym-variant-';

  function getSessions() {
    try {
      return JSON.parse(localStorage.getItem(SESSIONS_KEY)) || [];
    } catch { return []; }
  }

  function saveSessions(sessions) {
    try {
      localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
    } catch (e) {
      alert('Storage full! Export your data and clear old sessions.');
    }
  }

  function addSession(session) {
    const sessions = getSessions();
    sessions.push(session);
    saveSessions(sessions);
  }

  function getWIP() {
    try {
      return JSON.parse(localStorage.getItem(WIP_KEY));
    } catch { return null; }
  }

  function saveWIP(wip) {
    try {
      localStorage.setItem(WIP_KEY, JSON.stringify(wip));
    } catch (e) {
      console.error('Failed to save WIP:', e);
    }
  }

  function clearWIP() {
    localStorage.removeItem(WIP_KEY);
  }

  function markExported(sessionIndex) {
    const sessions = getSessions();
    if (sessions[sessionIndex]) {
      sessions[sessionIndex].exported = true;
      saveSessions(sessions);
    }
  }

  function getUnexportedSessions() {
    return getSessions().filter(s => !s.exported);
  }

  // Sled length distance (meters per length, persists across sessions)
  function getSledLength() {
    return parseFloat(localStorage.getItem(SLED_LENGTH_KEY)) || 15;
  }

  function setSledLength(meters) {
    localStorage.setItem(SLED_LENGTH_KEY, String(meters));
  }

  // Variant selection per exercise (persists across sessions)
  function getVariant(exerciseId) {
    return localStorage.getItem(VARIANT_PREFIX + exerciseId) || null;
  }

  function setVariant(exerciseId, variantId) {

  const GYM_LIST_KEY = 'gym-gym-list';
  const GYM_LAST_KEY = 'gym-last-gym';
  const DEFAULT_GYM = 'Max Fitness Flora Praha';

  function getGymList() {
    try {
      const list = JSON.parse(localStorage.getItem(GYM_LIST_KEY));
      if (Array.isArray(list) && list.length > 0) return list;
    } catch {}
    return [DEFAULT_GYM];
  }
  function saveGymList(list) { localStorage.setItem(GYM_LIST_KEY, JSON.stringify(list)); }
  function getLastGym() { return localStorage.getItem(GYM_LAST_KEY) || getGymList()[0]; }
  function setLastGym(name) { localStorage.setItem(GYM_LAST_KEY, name); }
